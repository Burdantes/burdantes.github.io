u003c/span\u003e\u003c/td\u003e\u003ctd\u003eMTN Zambia\u003c/td\u003e\u003ctd\u003eZM\u003c/td\u003e\u003ctd\u003eLusaka\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e24.2\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003cspan class=\"ip-flag ip-flag-as\"\u003eAS change\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #F4511E\"\u003e10\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e41.216.77.102\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#F4511E\"\u003eAS36962\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eMTN Zambia\u003c/td\u003e\u003ctd\u003eZM\u003c/td\u003e\u003ctd\u003eLusaka\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e24.2\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\u003c/details\u003e\u003c/div\u003e", "plots": [], "title": "Interesting Example Paths"}, {"analysis": "topology_graphs", "blurb": "The autonomous-system graph school traffic crosses to leave the country. Nodes are networks; edges are observed links.", "narrative_html": "\u003cp\u003eThe AS-level graph for this period contains 19 autonomous systems connected by 28 observed edges, built from 1,708 valid traceroute measurements. Each node is a network operator; each edge is a peering or transit link observed at least once in school traffic. \nThe finer-grained AS-city graph resolves routing through 48 location-specific nodes, of which \u003cstrong\u003e2\u003c/strong\u003e are Internet Exchange Points: physical facilities where ISPs and content networks peer directly. A high IXP-node count suggests traffic is exchanged at multiple peering locations rather than being funnelled through a single upstream provider.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eGraph\u003c/th\u003e\n\u003cth\u003eNodes\u003c/th\u003e\n\u003cth\u003eEdges\u003c/th\u003e\n\u003cth\u003eValid measurements\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-level\u003c/td\u003e\n\u003ctd\u003e19\u003c/td\u003e\n\u003ctd\u003e28\u003c/td\u003e\n\u003ctd\u003e1,708\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-city\u003c/td\u003e\n\u003ctd\u003e48\u003c/td\u003e\n\u003ctd\u003e70\u003c/td\u003e\n\u003ctd\u003e7,676\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- IXP nodes in AS-city graph: \u003cstrong\u003e2\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/topology_graphs/as_city_force_directed.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/topology_graphs/as_city_hierarchical.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/topology_graphs/as_city_layered_sankey.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/topology_graphs/as_graph.html"], "title": "Network Topology Graphs"}, {"analysis": "path_length", "blurb": "Hop counts from schools to domestic versus foreign servers. Fewer hops mean more direct routes.", "narrative_html": "\u003cp\u003ePath length counts the intermediate hops, at both the IP and autonomous-system level, that school traffic traverses before reaching its destination. Longer paths generally correlate with higher latency and more opportunities for packet loss. The table below shows mean / median across local (domestic M-Lab server) and international destinations.\u003c/p\u003e\n\u003cp\u003eAcross all destinations this period, traceroutes traverse a mean of \u003cstrong\u003e4.0 IP hops\u003c/strong\u003e and cross \u003cstrong\u003e1.2 autonomous systems\u003c/strong\u003e on average. The mean geographic path distance is 1,244 km (median 1,221 km), which reflects the physical routing footprint of school traffic.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eInternational\u003c/th\u003e\n\u003cth\u003eOverall\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIP Hops\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e4.0 / 4.0\u003c/td\u003e\n\u003ctd\u003e4.0 / 4.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAS Path Length\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1.2 / 1.0\u003c/td\u003e\n\u003ctd\u003e1.2 / 1.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eGeographic Distance (km)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1243.7 / 1220.8\u003c/td\u003e\n\u003ctd\u003e1243.7 / 1220.8\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCountries Traversed\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1.0 / 1.0\u003c/td\u003e\n\u003ctd\u003e1.0 / 1.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cem\u003e(mean / median)\u003c/em\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_geo_distance_km_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_geo_distance_km_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_n_as_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_n_as_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_n_hops_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_n_hops_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_rtt_ms_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_length/cdf_rtt_ms_by_server.html"], "title": "Average Path Length: Local vs International"}, {"analysis": "ixp_crossing", "blurb": "How often traffic crosses an Internet Exchange Point, where networks peer locally instead of routing abroad.", "narrative_html": "\u003cp\u003eInternet Exchange Points (IXPs) are physical locations where networks interconnect and exchange traffic directly, often reducing latency and transit costs. A traceroute is counted as crossing an IXP when at least one hop falls within a known IXP prefix. The crossing fraction $f_{\\text{IXP}}$ is defined as the ratio of tests with at least one IXP hop to the total number of tests. Higher values indicate that school traffic benefits from local peering infrastructure.\u003c/p\u003e\n\u003cp\u003eThe low crossing rate ($f_{\\text{IXP}} = 1,516 / 8,032 = 18.9\\%$) indicates that most school traffic does not pass through a recognised IXP, which may reflect limited local peering or gaps in IXP prefix coverage in the dataset.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOverall:\u003c/strong\u003e 18.9% of tests cross at least one IXP (1,516 / 8,032)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003eAvg IXPs\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e20.3%\u003c/td\u003e\n\u003ctd\u003e0.20\u003c/td\u003e\n\u003ctd\u003e7,484\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e367\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003empm02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eIXPs Crossed (% of tests)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/328570\" rel=\"noopener noreferrer\"\u003eAS328570\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eUnknown\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e100.0%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e (100.0%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36962\" rel=\"noopener noreferrer\"\u003eAS36962\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eMTN Zambia\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e95.3%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1,427\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e (95.3%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37154\" rel=\"noopener noreferrer\"\u003eAS37154\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eZambia Telecommunications Company .\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e86.2%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e80\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e (65.0%), \u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Cape%20Town\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Cape Town\u003c/a\u003e (21.2%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37287\" rel=\"noopener noreferrer\"\u003eAS37287\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eZain Zambia PLC\u003c/td\u003e\n\u003ctd\u003e1.0%\u003c/td\u003e\n\u003ctd\u003e6,501\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e (1.0%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eIXP\u003c/th\u003e\n\u003cth\u003eHops\u003c/th\u003e\n\u003cth\u003eCountries\u003c/th\u003e\n\u003cth\u003eServers\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e1,499\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Cape%20Town\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Cape Town\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e17\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/ixp_crossing/ixp_crossing_by_server.html"], "title": "IXP Crossing Analysis"}, {"analysis": "transit_countries", "blurb": "The foreign countries school traffic transits before reaching its destination. More countries mean more external dependence.", "narrative_html": "\u003cp\u003eWhen a traceroute hop is geolocated or registered to a country other than the origin or destination, that country is a transit country: its infrastructure carries the traffic. Heavy dependence on a single transit country creates geopolitical and reliability risk. Policy changes or outages there can affect all international school connectivity. Two methods are used: IP geolocation of hop addresses, and the registration country of each hop\u0027s autonomous system.\u003c/p\u003e\n\u003cp\u003eBy IP geolocation, \u003cstrong\u003eZA\u003c/strong\u003e is the most common transit country (2.3% of international tests), but no single country dominates. Traffic is distributed across multiple transit nations.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBy IP Geolocation:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e2.3%\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eZW\u003c/td\u003e\n\u003ctd\u003e0.4%\u003c/td\u003e\n\u003ctd\u003e35\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNA\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eBy AS Registration Country:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e4.6%\u003c/td\u003e\n\u003ctd\u003e367\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e2.3%\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMW\u003c/td\u003e\n\u003ctd\u003e1.0%\u003c/td\u003e\n\u003ctd\u003e82\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e0.9%\u003c/td\u003e\n\u003ctd\u003e72\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMU\u003c/td\u003e\n\u003ctd\u003e0.4%\u003c/td\u003e\n\u003ctd\u003e34\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eBW\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNA\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003ctd\u003e23\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/transit_countries/transit_country_sankey_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/transit_countries/transit_dependency_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/transit_countries/transit_dependency_as_registration_June%202026.html"], "title": "Transit Country Dependency"}, {"analysis": "transit_concentration", "blurb": "How concentrated international routes are across transit providers. High concentration is a resilience risk.", "narrative_html": "\u003cp\u003eThis measures how centralized a country\u0027s international routing is. Chokepoint coverage is the share of international tests whose path includes the single most-traversed transit AS. The egress Herfindahl-Hirschman Index partitions tests by one representative egress operator each and is defined as\u003c/p\u003e\n\u003cp\u003e$$\\mathrm{HHI} = \\sum_{i} s_i^2$$\u003c/p\u003e\n\u003cp\u003ewhere $s_i$ is operator $i$\u0027s share of tests. $\\mathrm{HHI}$ near $1$ means a single operator carries essentially all traffic. We report three egress views: the first observed transit AS, the first AS located outside the country (physical border), and the first foreign-registered AS (ownership). Domestic hops are often unresolved, so the first observed transit can already be a foreign operator.\u003c/p\u003e\n\u003cp\u003eChokepoint coverage: \u003cstrong\u003e16.1%\u003c/strong\u003e of international tests traverse the single most-used transit AS (AS16637), indicating limited dependence.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEgress, first observed transit: $\\mathrm{HHI}=0.589$, top operator AS16637 carries 75.7% of tests (6,324 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first out-of-country: $\\mathrm{HHI}=0.589$, top operator AS16637 carries 75.7% of tests (6,325 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first foreign-registered: $\\mathrm{HHI}=0.589$, top operator AS16637 carries 75.7% of tests (6,324 tests without one)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRank\u003c/th\u003e\n\u003cth\u003eTransit ASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eReg.\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eCoverage\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/16637\" rel=\"noopener noreferrer\"\u003eAS16637\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eMTN South Africa\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e1,293\u003c/td\u003e\n\u003ctd\u003e16.1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36994\" rel=\"noopener noreferrer\"\u003eAS36994\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eVodacom\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003ctd\u003e2.3%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eSkyband\u003c/td\u003e\n\u003ctd\u003eMW\u003c/td\u003e\n\u003ctd\u003e82\u003c/td\u003e\n\u003ctd\u003e1.0%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/30844\" rel=\"noopener noreferrer\"\u003eAS30844\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eLiquid Intelligent Technologi.\u003c/td\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e72\u003c/td\u003e\n\u003ctd\u003e0.9%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/327996\" rel=\"noopener noreferrer\"\u003eAS327996\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eAccelerit\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e69\u003c/td\u003e\n\u003ctd\u003e0.9%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37100\" rel=\"noopener noreferrer\"\u003eAS37100\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eSEACOM\u003c/td\u003e\n\u003ctd\u003eMU\u003c/td\u003e\n\u003ctd\u003e33\u003c/td\u003e\n\u003ctd\u003e0.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37146\" rel=\"noopener noreferrer\"\u003eAS37146\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eHai Telecommunications Limited\u003c/td\u003e\n\u003ctd\u003eZM\u003c/td\u003e\n\u003ctd\u003e31\u003c/td\u003e\n\u003ctd\u003e0.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e8\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37154\" rel=\"noopener noreferrer\"\u003eAS37154\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eZambia Telecommunications Com.\u003c/td\u003e\n\u003ctd\u003eZM\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37678\" rel=\"noopener noreferrer\"\u003eAS37678\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eBotswana Fibre Networks\u003c/td\u003e\n\u003ctd\u003eBW\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e10\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36996\" rel=\"noopener noreferrer\"\u003eAS36996\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eTelecom Namibia\u003c/td\u003e\n\u003ctd\u003eNA\u003c/td\u003e\n\u003ctd\u003e23\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eEgress concentration by source ASN (first-transit HHI):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eSource ASN\u003c/th\u003e\n\u003cth\u003eIntl n\u003c/th\u003e\n\u003cth\u003eEgress HHI\u003c/th\u003e\n\u003cth\u003eTop egress\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36962\" rel=\"noopener noreferrer\"\u003eAS36962\u003c/a\u003e (MTN Zambia)\u003c/td\u003e\n\u003ctd\u003e1,427\u003c/td\u003e\n\u003ctd\u003e0.89\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/16637\" rel=\"noopener noreferrer\"\u003eAS16637\u003c/a\u003e (91%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37154\" rel=\"noopener noreferrer\"\u003eAS37154\u003c/a\u003e (Zambia Telecommunication.)\u003c/td\u003e\n\u003ctd\u003e80\u003c/td\u003e\n\u003ctd\u003e0.52\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e (65%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37287\" rel=\"noopener noreferrer\"\u003eAS37287\u003c/a\u003e (Zain Zambia PLC)\u003c/td\u003e\n\u003ctd\u003e6,501\u003c/td\u003e\n\u003ctd\u003e0.57\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36994\" rel=\"noopener noreferrer\"\u003eAS36994\u003c/a\u003e (3%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/328570\" rel=\"noopener noreferrer\"\u003eAS328570\u003c/a\u003e (Fibrecom Limited)\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e1.00\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37678\" rel=\"noopener noreferrer\"\u003eAS37678\u003c/a\u003e (100%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": [], "title": "International Transit Concentration"}, {"analysis": "loss_analysis", "blurb": "Packet loss along measured paths, and how it tracks with path length and distance.", "narrative_html": "\u003cp\u003ePacket loss is measured at each traceroute hop as the fraction of probes that receive no response. This section examines how loss rates vary with path length (number of AS hops) and geographic distance. Longer, more geographically dispersed paths typically experience higher cumulative loss, but loss concentrated at short paths may indicate access-layer or last-mile issues rather than backbone congestion.\u003c/p\u003e\n\u003cp\u003eLoss rates are highest for paths traversing \u003cstrong\u003e3 AS hops\u003c/strong\u003e (mean loss 0.1171), and lowest for \u003cstrong\u003e4 AS hops\u003c/strong\u003e (mean loss 0.0092). A clear monotonic increase with path length would implicate backbone transit; a spike at short paths suggests last-mile or access network issues.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by AS Path Length:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAS Count\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003cth\u003eIQR\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e15\u003c/td\u003e\n\u003ctd\u003e0.1281\u003c/td\u003e\n\u003ctd\u003e0.1171\u003c/td\u003e\n\u003ctd\u003e[0.0500, 0.1663]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e0.0004\u003c/td\u003e\n\u003ctd\u003e0.0092\u003c/td\u003e\n\u003ctd\u003e[0.0002, 0.0048]\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGeographically, loss is highest in the \u003cstrong\u003e1,000\u20135,000 km\u003c/strong\u003e distance bucket (mean loss 0.0366), pointing to where in the routing chain congestion or quality degradation is most pronounced.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by Geographic Distance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDistance\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Dist (km)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1,000\u20135,000 km\u003c/td\u003e\n\u003ctd\u003e8,032\u003c/td\u003e\n\u003ctd\u003e1,221\u003c/td\u003e\n\u003ctd\u003e0.0014\u003c/td\u003e\n\u003ctd\u003e0.0366\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/cdf_geographic_distance.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/cdf_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/loss_by_as_count_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/loss_by_as_count_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/loss_by_distance_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/loss_by_distance_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/loss_analysis/loss_vs_distance_scatter.html"], "title": "Loss Rate Analysis"}, {"analysis": "school_performance", "blurb": "Round-trip time, throughput, and loss per school. Flags the underserved.", "narrative_html": "\u003cp\u003eThis section profiles connectivity quality at the level of individual schools, aggregating RTT, throughput, and loss metrics per school IP. Schools in the top quartile of both RTT and loss are flagged as underserved, a heuristic that surfaces schools with poor path quality on multiple dimensions simultaneously. These schools may benefit most from targeted infrastructure investment or routing improvements.\u003c/p\u003e\n\u003cp\u003eOnly 8.5% of schools (38 of 445) are underserved (RTT $\\geq 78.5$ ms and loss $\\geq 0.0274$), suggesting generally adequate path quality across the school population.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSchools with $\\geq 5$ tests: \u003cstrong\u003e445\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUnderserved (top quartile RTT + loss): \u003cstrong\u003e38\u003c/strong\u003e (8.5%)\u003c/li\u003e\n\u003cli\u003eThresholds: RTT $\\geq 78.5$ ms, loss $\\geq 0.0274$\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePer-ASN School Stats (median of school medians):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eSchools\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eUnderserved\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37287\" rel=\"noopener noreferrer\"\u003eAS37287\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e394\u003c/td\u003e\n\u003ctd\u003e60.3\u003c/td\u003e\n\u003ctd\u003e8.6\u003c/td\u003e\n\u003ctd\u003e0.0022\u003c/td\u003e\n\u003ctd\u003e37\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36962\" rel=\"noopener noreferrer\"\u003eAS36962\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e47\u003c/td\u003e\n\u003ctd\u003e45.8\u003c/td\u003e\n\u003ctd\u003e8.9\u003c/td\u003e\n\u003ctd\u003e0.0009\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37154\" rel=\"noopener noreferrer\"\u003eAS37154\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e25.5\u003c/td\u003e\n\u003ctd\u003e3.2\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/328570\" rel=\"noopener noreferrer\"\u003eAS328570\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e25.5\u003c/td\u003e\n\u003ctd\u003e6.0\u003c/td\u003e\n\u003ctd\u003e0.0004\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/school_performance/school_rtt_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/school_performance/school_rtt_vs_loss.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/school_performance/school_rtt_vs_throughput.html"], "title": "Per-School Performance"}, {"analysis": "temporal", "blurb": "How performance shifts by hour and day of week, in local time.", "narrative_html": "\u003cp\u003eNetwork performance for schools often varies systematically with time of day and day of week, reflecting shared infrastructure contention during school hours or business peaks. This section shows how test volume, RTT, throughput, and loss shift across hours and days. Pronounced diurnal patterns can indicate congestion during peak hours; weekend vs. weekday differences may reflect shared community or campus network usage.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDay-of-week and hour-of-day are in local time (Africa/Lusaka).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThere is a pronounced diurnal RTT swing of \u003cstrong\u003e30.7 ms\u003c/strong\u003e between the best hour (04:00, 43.3 ms) and the worst (19:00, 74.0 ms), consistent with shared-infrastructure congestion during peak hours.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHour-of-Day (local time):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePeak usage: \u003cstrong\u003e09:00\u003c/strong\u003e (629 tests); quietest: 04:00 (64)\u003c/li\u003e\n\u003cli\u003eMedian RTT: best at 04:00 (43.3 ms), worst at 19:00 (74.0 ms)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDay-of-Week Performance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDay\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMonday\u003c/td\u003e\n\u003ctd\u003e1,361\u003c/td\u003e\n\u003ctd\u003e55.9\u003c/td\u003e\n\u003ctd\u003e8.4\u003c/td\u003e\n\u003ctd\u003e0.0014\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTuesday\u003c/td\u003e\n\u003ctd\u003e1,486\u003c/td\u003e\n\u003ctd\u003e57.8\u003c/td\u003e\n\u003ctd\u003e9.2\u003c/td\u003e\n\u003ctd\u003e0.0012\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eWednesday\u003c/td\u003e\n\u003ctd\u003e1,105\u003c/td\u003e\n\u003ctd\u003e57.7\u003c/td\u003e\n\u003ctd\u003e10.7\u003c/td\u003e\n\u003ctd\u003e0.0006\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eThursday\u003c/td\u003e\n\u003ctd\u003e1,031\u003c/td\u003e\n\u003ctd\u003e57.5\u003c/td\u003e\n\u003ctd\u003e6.7\u003c/td\u003e\n\u003ctd\u003e0.0021\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFriday\u003c/td\u003e\n\u003ctd\u003e1,340\u003c/td\u003e\n\u003ctd\u003e54.0\u003c/td\u003e\n\u003ctd\u003e10.4\u003c/td\u003e\n\u003ctd\u003e0.0020\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaturday\u003c/td\u003e\n\u003ctd\u003e803\u003c/td\u003e\n\u003ctd\u003e58.7\u003c/td\u003e\n\u003ctd\u003e13.9\u003c/td\u003e\n\u003ctd\u003e0.0011\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSunday\u003c/td\u003e\n\u003ctd\u003e906\u003c/td\u003e\n\u003ctd\u003e52.6\u003c/td\u003e\n\u003ctd\u003e9.8\u003c/td\u003e\n\u003ctd\u003e0.0009\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eTests/day: mean=223, min=2, max=409\u003c/li\u003e\n\u003cli\u003eIPs/day: mean=27\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/daily_performance.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/daily_server_split.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/dow_ndt_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/dow_ndt_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/dow_ndt_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/temporal/hourly_performance.html"], "title": "Temporal Patterns"}, {"analysis": "path_quality", "blurb": "Route stability and health over the period.", "narrative_html": "\u003cp\u003ePath quality encompasses several complementary metrics. \u003cstrong\u003eReachability\u003c/strong\u003e measures whether traceroutes successfully reach the destination AS; gaps indicate routing black-holes or firewall drops. The \u003cstrong\u003egeographic detour ratio\u003c/strong\u003e $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ compares the total geolocated hop distance $d_{\\text{path}}$ to the straight-line great-circle distance $d_{\\text{gc}}$ between the school and server; $\\rho = 1.0$ is a perfectly direct route, and larger values indicate circuitous routing (tromboning). \u003cstrong\u003ePath stability\u003c/strong\u003e captures how often the same school-to-server pair uses different AS-level routes across repeated tests.\u003c/p\u003e\n\u003cp\u003eReachability is low at 0.5%. More than a quarter of traceroutes fail to reach the destination AS. This is a significant signal that warrants investigation of routing or firewall policies on affected server paths.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReachability:\u003c/strong\u003e 0.5% of traceroutes reach the destination ASN\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eReachability\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e0.5%\u003c/td\u003e\n\u003ctd\u003e7,484\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e367\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003empm02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThe mean detour ratio $\\rho = 1.04$ is close to the theoretical minimum of 1.0, suggesting that school traffic follows geographically efficient routes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeographic Detour Ratio\u003c/strong\u003e (path distance / great-circle distance):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOverall: mean=1.04, median=1.02\u003c/li\u003e\n\u003cli\u003eA ratio of 1.0 = perfectly direct; higher = more circuitous routing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eMean Detour\u003c/th\u003e\n\u003cth\u003eMedian Detour\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e1.04\u003c/td\u003e\n\u003ctd\u003e1.02\u003c/td\u003e\n\u003ctd\u003e7,484\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e1.03\u003c/td\u003e\n\u003ctd\u003e1.02\u003c/td\u003e\n\u003ctd\u003e367\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003empm02\u003c/td\u003e\n\u003ctd\u003e1.07\u003c/td\u003e\n\u003ctd\u003e1.08\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003ePath stability is high: 97.5% of school-server flows use a single consistent AS path, and the mean number of distinct paths per flow is 1.04. Stable routing simplifies troubleshooting and suggests well-established peering relationships.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePath Stability\u003c/strong\u003e (school\u2192server flows with $\\geq 3$ tests):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlows analyzed: 560\u003c/li\u003e\n\u003cli\u003eMean distinct AS paths per flow: 1.04\u003c/li\u003e\n\u003cli\u003eFlows with a single stable path: 97.5%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eReverse Path:\u003c/strong\u003e 34 / 8,032 measurements have reverse traceroute (0.4%)\u003c/p\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_quality/cdf_detour_ratio.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_quality/cdf_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/zm/june_2026/path_quality/path_stability.html"], "title": "Path Quality"}, {"analysis": "rtt_decomposition", "blurb": "Where latency accumulates: domestic access versus international transit.", "narrative_html": "\u003cp\u003eRTT decomposition attributes total round-trip latency to individual transit autonomous systems and countries by computing the incremental delay added at each hop. This pinpoints which network operators or geographic segments contribute the most to observed latency. The detour ratio $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ (path distance over great-circle distance) contextualises whether latency stems from physical distance or routing inefficiency.\u003c/p\u003e\n\u003cp\u003eThe single largest RTT contributor is \u003cstrong\u003eAS2018\u003c/strong\u003e, adding a mean of \u003cstrong\u003e5.5 ms\u003c/strong\u003e per traceroute (9.7% of total observed RTT). Identifying the operator and location of this AS can guide peering negotiations or routing policy changes to reduce latency for schools.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Transit ASN (top 10):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003eMean % of Total\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/2018\" rel=\"noopener noreferrer\"\u003eAS2018\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e5.5\u003c/td\u003e\n\u003ctd\u003e1.5\u003c/td\u003e\n\u003ctd\u003e9.7%\u003c/td\u003e\n\u003ctd\u003e7,419\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/16637\" rel=\"noopener noreferrer\"\u003eAS16637\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e26.2\u003c/td\u003e\n\u003ctd\u003e24.8\u003c/td\u003e\n\u003ctd\u003e54.6%\u003c/td\u003e\n\u003ctd\u003e1,277\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/15169\" rel=\"noopener noreferrer\"\u003eAS15169\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e5.3\u003c/td\u003e\n\u003ctd\u003e1.2\u003c/td\u003e\n\u003ctd\u003e10.2%\u003c/td\u003e\n\u003ctd\u003e367\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37223\" rel=\"noopener noreferrer\"\u003eAS37223\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e2.7\u003c/td\u003e\n\u003ctd\u003e2.7\u003c/td\u003e\n\u003ctd\u003e4.1%\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/36994\" rel=\"noopener noreferrer\"\u003eAS36994\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e181\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e18.1\u003c/td\u003e\n\u003ctd\u003e23.6\u003c/td\u003e\n\u003ctd\u003e57.5%\u003c/td\u003e\n\u003ctd\u003e79\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/30844\" rel=\"noopener noreferrer\"\u003eAS30844\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e23.3\u003c/td\u003e\n\u003ctd\u003e22.7\u003c/td\u003e\n\u003ctd\u003e45.6%\u003c/td\u003e\n\u003ctd\u
