\u003eAS28910\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eUzbektelekom\u003c/td\u003e\u003ctd\u003eUZ\u003c/td\u003e\u003ctd\u003eTashkent\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e129.6\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #9334E6\"\u003e12\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e195.69.189.161\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#9334E6\"\u003eAS28910\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eUzbektelekom\u003c/td\u003e\u003ctd\u003eUZ\u003c/td\u003e\u003ctd\u003eTashkent\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e129.9\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\u003c/details\u003e\u003c/div\u003e", "plots": [], "title": "Interesting Example Paths"}, {"analysis": "topology_graphs", "blurb": "The autonomous-system graph school traffic crosses to leave the country. Nodes are networks; edges are observed links.", "narrative_html": "\u003cp\u003eThe AS-level graph for this period contains 34 autonomous systems connected by 65 observed edges, built from 158,160 valid traceroute measurements. Each node is a network operator; each edge is a peering or transit link observed at least once in school traffic. \nThe finer-grained AS-city graph resolves routing through 120 location-specific nodes, of which \u003cstrong\u003e7\u003c/strong\u003e are Internet Exchange Points: physical facilities where ISPs and content networks peer directly. A high IXP-node count suggests traffic is exchanged at multiple peering locations rather than being funnelled through a single upstream provider.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eGraph\u003c/th\u003e\n\u003cth\u003eNodes\u003c/th\u003e\n\u003cth\u003eEdges\u003c/th\u003e\n\u003cth\u003eValid measurements\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-level\u003c/td\u003e\n\u003ctd\u003e34\u003c/td\u003e\n\u003ctd\u003e65\u003c/td\u003e\n\u003ctd\u003e158,160\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-city\u003c/td\u003e\n\u003ctd\u003e120\u003c/td\u003e\n\u003ctd\u003e214\u003c/td\u003e\n\u003ctd\u003e158,181\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- IXP nodes in AS-city graph: \u003cstrong\u003e7\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/topology_graphs/as_city_force_directed.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/topology_graphs/as_city_hierarchical.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/topology_graphs/as_city_layered_sankey.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/topology_graphs/as_graph.html"], "title": "Network Topology Graphs"}, {"analysis": "path_length", "blurb": "Hop counts from schools to domestic versus foreign servers. Fewer hops mean more direct routes.", "narrative_html": "\u003cp\u003ePath length counts the intermediate hops, at both the IP and autonomous-system level, that school traffic traverses before reaching its destination. Longer paths generally correlate with higher latency and more opportunities for packet loss. The table below shows mean / median across local (domestic M-Lab server) and international destinations.\u003c/p\u003e\n\u003cp\u003eAcross all destinations this period, traceroutes traverse a mean of \u003cstrong\u003e13.4 IP hops\u003c/strong\u003e and cross \u003cstrong\u003e4.6 autonomous systems\u003c/strong\u003e on average. The mean geographic path distance is 6,873 km (median 8,012 km), which reflects the physical routing footprint of school traffic.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eInternational\u003c/th\u003e\n\u003cth\u003eOverall\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIP Hops\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e13.4 / 13.0\u003c/td\u003e\n\u003ctd\u003e13.4 / 13.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAS Path Length\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e4.6 / 5.0\u003c/td\u003e\n\u003ctd\u003e4.6 / 5.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eGeographic Distance (km)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e6873.0 / 8012.0\u003c/td\u003e\n\u003ctd\u003e6873.0 / 8012.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCountries Traversed\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3.2 / 3.0\u003c/td\u003e\n\u003ctd\u003e3.2 / 3.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cem\u003e(mean / median)\u003c/em\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_geo_distance_km_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_geo_distance_km_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_n_as_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_n_as_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_n_hops_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_n_hops_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_rtt_ms_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_length/cdf_rtt_ms_by_server.html"], "title": "Average Path Length: Local vs International"}, {"analysis": "ixp_crossing", "blurb": "How often traffic crosses an Internet Exchange Point, where networks peer locally instead of routing abroad.", "narrative_html": "\u003cp\u003eInternet Exchange Points (IXPs) are physical locations where networks interconnect and exchange traffic directly, often reducing latency and transit costs. A traceroute is counted as crossing an IXP when at least one hop falls within a known IXP prefix. The crossing fraction $f_{\\text{IXP}}$ is defined as the ratio of tests with at least one IXP hop to the total number of tests. Higher values indicate that school traffic benefits from local peering infrastructure.\u003c/p\u003e\n\u003cp\u003eThe low crossing rate ($f_{\\text{IXP}} = 578 / 158,181 = 0.4\\%$) indicates that most school traffic does not pass through a recognised IXP, which may reflect limited local peering or gaps in IXP prefix coverage in the dataset.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOverall:\u003c/strong\u003e 0.4% of tests cross at least one IXP (578 / 158,181)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003eAvg IXPs\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003edel02 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e22.7%\u003c/td\u003e\n\u003ctd\u003e0.23\u003c/td\u003e\n\u003ctd\u003e450\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel04 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e51.3%\u003c/td\u003e\n\u003ctd\u003e0.51\u003c/td\u003e\n\u003ctd\u003e602\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel05 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e25.0%\u003c/td\u003e\n\u003ctd\u003e0.25\u003c/td\u003e\n\u003ctd\u003e40\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003elhe152605 (Lahore)\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e157,089\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eIXPs Crossed (% of tests)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/49273\" rel=\"noopener noreferrer\"\u003eAS49273\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eForeign Enterprise COSCOM Liabilit.\u003c/td\u003e\n\u003ctd\u003e3.7%\u003c/td\u003e\n\u003ctd\u003e1,072\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=DE-CIX%20Frankfurt\" rel=\"noopener noreferrer\"\u003eDE-CIX Frankfurt\u003c/a\u003e (3.1%), \u003ca href=\"https://www.peeringdb.com/search?q=Equinix%20Singapore\" rel=\"noopener noreferrer\"\u003eEquinix Singapore\u003c/a\u003e (0.7%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/8193\" rel=\"noopener noreferrer\"\u003eAS8193\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eUzbektelekom Joint Stock Company\u003c/td\u003e\n\u003ctd\u003e0.4%\u003c/td\u003e\n\u003ctd\u003e140,508\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NL-ix\" rel=\"noopener noreferrer\"\u003eNL-ix\u003c/a\u003e (0.2%), \u003ca href=\"https://www.peeringdb.com/search?q=DE-CIX%20Frankfurt\" rel=\"noopener noreferrer\"\u003eDE-CIX Frankfurt\u003c/a\u003e (0.1%), \u003ca href=\"https://www.peeringdb.com/search?q=France-IX%20Marseille\" rel=\"noopener td\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003ctd\u003eDE\u003c/td\u003e\n\u003ctd\u003edel04\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/ixp_crossing/ixp_crossing_by_server.html"], "title": "IXP Crossing Analysis"}, {"analysis": "transit_countries", "blurb": "The foreign countries school traffic transits before reaching its destination. More countries mean more external dependence.", "narrative_html": "\u003cp\u003eWhen a traceroute hop is geolocated or registered to a country other than the origin or destination, that country is a transit country: its infrastructure carries the traffic. Heavy dependence on a single transit country creates geopolitical and reliability risk. Policy changes or outages there can affect all international school connectivity. Two methods are used: IP geolocation of hop addresses, and the registration country of each hop\u0027s autonomous system.\u003c/p\u003e\n\u003cp\u003eBy IP geolocation, \u003cstrong\u003eRU\u003c/strong\u003e is the dominant transit country, appearing in 80.3% of international tests. A single dominant transit country means that a large share of the country\u0027s outbound school traffic is physically routed through foreign infrastructure before reaching its destination.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBy IP Geolocation:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eRU\u003c/td\u003e\n\u003ctd\u003e80.3% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e127,055\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKZ\u003c/td\u003e\n\u003ctd\u003e40.4%\u003c/td\u003e\n\u003ctd\u003e63,943\u003c/td\u td\u003e\n\u003ctd\u003e288\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eHK\u003c/td\u003e\n\u003ctd\u003e0.2%\u003c/td\u003e\n\u003ctd\u003e258\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eDE\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e216\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e112\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePK\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLK\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eBG\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/transit_countries/transit_country_sankey_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/transit_countries/transit_dependency_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/transit_countries/transit_dependency_as_registration_June%202026.html"], "title": "Transit Country Dependency"}, {"analysis": "transit_concentration", "blurb": "How concentrated international routes are across transit providers. High concentration is a resilience risk.", "narrative_html": "\u003cp\u003eThis measures how centralized a country\u0027s international routing is. Chokepoint coverage is the share of international tests whose path includes the single most-traversed transit AS. The egress Herfindahl-Hirschman Index partitions tests by one representative egress operator each and is defined as\u003c/p\u003e\n\u003cp\u003e$$\\mathrm{HHI} = \\sum_{i} s_i^2$$\u003c/p\u003e\n\u003cp\u003ewhere $s_i$ is operator $i$\u0027s share of tests. $\\mathrm{HHI}$ near $1$ means a single operator carries essentially all traffic. We report three egress views: the first observed transit AS, the first AS located outside the country (physical border), and the first foreign-registered AS (ownership). Domestic hops are often unresolved, so the first observed transit can already be a foreign operator.\u003c/p\u003e\n\u003cp\u003eChokepoint coverage: \u003cstrong\u003e99.8%\u003c/strong\u003e of international tests traverse the single most-used transit AS (AS28910), indicating severe single-point dependence.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEgress, first observed transit: $\\mathrm{HHI}=0.986$, top operator AS38193 carries 99.3% of tests (21 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first out-of-country: $\\mathrm{HHI}=0.986$, top operator AS38193 carries 99.3% of tests (27 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first foreign-registered: $\\mathrm{HHI}=0.986$, top operator AS38193 carries 99.3% of tests (31 tests without one)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRank\u003c/th\u003e\n\u003cth\u003eTransit ASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eReg.\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eCoverage\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/28910\" rel=\"noopener noreferrer\"\u003eAS28910\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eUzbektelekom\u003c/td\u003e\n\u003ctd\u003eUZ\u003c/td\u003e\n\u003ctd\u003e157,894\u003c/td\u003e\n\u003ctd\u003e99.8%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/38193\" rel=\"noopener noreferrer\"\u003eAS38193\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eTrans World Associates\u003c/td\u003e\n\u cally experience higher cumulative loss, but loss concentrated at short paths may indicate access-layer or last-mile issues rather than backbone congestion.\u003c/p\u003e\n\u003cp\u003eLoss rates are highest for paths traversing \u003cstrong\u003e4 AS hops\u003c/strong\u003e (mean loss 0.1523), and lowest for \u003cstrong\u003e5 AS hops\u003c/strong\u003e (mean loss 0.0650). A clear monotonic increase with path length would implicate backbone transit; a spike at short paths suggests last-mile or access network issues.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by AS Path Length:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAS Count\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003cth\u003eIQR\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e52\u003c/td\u003e\n\u003ctd\u003e0.1975\u003c/td\u003e\n\u003ctd\u003e0.1523\u003c/td\u003e\n\u003ctd\u003e[0.0001, 0.3345]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e23,467\u003c/td\u003e\n\u003ctd\u003e0.0388\u003c/td\u003e\n\u003ctd\u003e0.0650\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.0895]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003ctd\u003e5,112\u003c/td\u003e\n\u003ctd\u003e0.0470\u003c/td\u003e\n\u003ctd\u003e0.0879\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.1571]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003ctd\u003e12\u003c/td\u003e\n\u003ctd\u003e0.0748\u003c/td\u003e\n\u003ctd\u003e0.0748\u003c/td\u003e\n\u003ctd\u003e[0.0644, 0.0852]\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGeographically, loss is highest in the \u003cstrong\u003e$\u0026gt;5{,}000$ km\u003c/strong\u003e distance bucket (mean loss 0.1065), pointing to where in the routing chain congestion or quality degradation is most pronounced.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by Geographic Distance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDistance\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Dist (km)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1,000\u20135,000 km\u003c/td\u003e\n\u003ctd\u003e30,120\u003c/td\u003e\n\u003ctd\u003e2,873\u003c/td\u003e\n\u003ctd\u003e0.0099\u003c/td\u003e\n\u003ctd\u003e0.0562\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e$\u0026gt;5{,}000$ km\u003c/td\u003e\n\u003ctd\u003e127,566\u003c/td\u003e\n\u003ctd\u003e8,015\u003c/td\u003e\n\u003ctd\u003e0.0671\u003c/td\u003e\n\u003ctd\u003e0.1065\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/cdf_geographic_distance.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/cdf_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/loss_by_as_count_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/loss_by_as_count_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/loss_by_distance_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/loss_by_distance_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/loss_analysis/loss_vs_distance_scatter.html"], "title": "Loss Rate Analysis"}, {"analysis": "school_performance", "blurb": "Round-trip time, throughput, and loss per school. Flags the underserved.", "narrative_html": "\u003cp\u003eThis section profiles connectivity quality at the level of individual schools, aggregating RTT, throughput, and loss metrics per school IP. Schools in the top quartile of both RTT and loss are flagged as underserved, a heuristic that surfaces schools with poor path quality on multiple dimensions simultaneously. These schools may benefit most from targeted infrastructure investment or routing improvements.\u003c/p\u003e\n\u003cp\u003eOnly 8.8% of schools (366 of 4,174) are underserved (RTT $\\geq 234.8$ ms and loss $\\geq 0.1063$), suggesting generally adequate path quality across the school population.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSchools with $\\geq 5$ tests: \u003cstrong\u003e4,174\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUnderserved (top quartile RTT + loss): \u003cstrong\u003e366\u003c/strong\u003e (8.8%)\u003c/li\u003e\n\u003cli\u003eThresholds: RTT $\\geq 234.8$ ms, loss $\\geq 0.1063$\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePer-ASN School Stats (median of school medians):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eSchools\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eUnderserved\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/8193\" rel=\"noopener noreferrer\"\u003eAS8193\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e3,076\u003c/td\u003e\n\u003ctd\u003e230.5\u003c/td\u003e\n\u003ctd\u003e36.8\u003c/td\u003e\n\u003ctd\u003e0.0487\u003c/td\u003e\n\u003ctd\u003e358\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/201767\" rel=\"noopener noreferrer\"\u003eAS201767\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e418\u003c/td\u003e\n\u003ctd\u003e173.3\u003c/td\u003e\n\u003ctd\u003e6.6\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/41202\" rel=\"noopener noreferrer\"\u003eAS41202\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e297\u003c/td\u003e\n\u003ctd\u003e165.3\u003c/td\u003e\n\u003ctd\u003e8.9\u003c/td\u003e\n\u003ctd\u003e0.0961\u003c/td\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64466\" rel=\"noopener noreferrer\"\u003eAS64466\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e272\u003c/td\u003e\n\u003ctd\u003e161.1\u003c/td\u003e\n\u003ctd\u003e10.4\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/49273\" rel=\"noopener noreferrer\"\u003eAS49273\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e111\u003c/td\u003e\n\u003ctd\u003e158.7\u003c/td\u003e\n\u003ctd\u003e4.1\u003c/td\u003e\n\u003ctd\u003e0.0002\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/school_performance/school_rtt_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/school_performance/school_rtt_vs_loss.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/school_performance/school_rtt_vs_throughput.html"], "title": "Per-School Performance"}, {"analysis": "temporal", "blurb": "How performance shifts by hour and day of week, in local time.", "narrative_html": "\u003cp\u003eNetwork performance for schools often varies systematically with time of day and day of week, reflecting shared infrastructure contention during school hours or business peaks. This section shows how test volume, RTT, throughput, and loss shift across hours and days. Pronounced diurnal patterns can indicate congestion during peak hours; weekend vs. weekday differences may reflect shared community or campus network usage.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDay-of-week and hour-of-day are in local time (Asia/Samarkand).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThere is a pronounced diurnal RTT swing of \u003cstrong\u003e73.7 ms\u003c/strong\u003e between the best hour (02:00, 160.0 ms) and the worst (04:00, 233.8 ms), consistent with shared-infrastructure congestion during peak hours.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHour-of-Day (local time):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePeak usage: \u003cstrong\u003e09:00\u003c/strong\u003e (35,396 tests); quietest: 03:00 (59)\u003c/li\u003e\n\u003cli\u003eMedian RTT: best at 02:00 (160.0 ms), worst at 04:00 (233.8 ms)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDay-of-Week Performance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDay\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMonday\u003c/td\u003e\n\u003ctd\u003e31,931\u003c/td\u003e\n\u003ctd\u003e231.1\u003c/td\u003e\n\u003ctd\u003e33.9\u003c/td\u003e\n\u003ctd\u003e0.0537\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTuesday\u003c/td\u003e\n\u003ctd\u003e39,869\u003c/td\u003e\n\u003ctd\u003e231.8\u003c/td\u003e\n\u003ctd\u003e34.9\u003c/td\u003e\n\u003ctd\u003e0.0477\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eWednesday\u003c/td\u003e\n\u003ctd\u003e17,366\u003c/td\u003e\n\u003ctd\u003e231.9\u003c/td\u003e\n\u003ctd\u003e34.0\u003c/td\u003e\n\u003ctd\u003e0.0461\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eThursday\u003c/td\u003e\n\u003ctd\u003e20,285\u003c/td\u003e\n\u003ctd\u003e231.2\u003c/td\u003e\n\u003ctd\u003e33.7\u003c/td\u003e\n\u003ctd\u003e0.0443\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFriday\u003c/td\u003e\n\u003ctd\u003e21,879\u003c/td\u003e\n\u003ctd\u003e231.3\u003c/td\u003e\n\u003ctd\u003e33.6\u003c/td\u003e\n\u003ctd\u003e0.0469\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaturday\u003c/td\u003e\n\u003ctd\u003e23,602\u003c/td\u003e\n\u003ctd\u003e232.8\u003c/td\u003e\n\u003ctd\u003e34.6\u003c/td\u003e\n\u003ctd\u003e0.0394\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSunday\u003c/td\u003e\n\u003ctd\u003e3,249\u003c/td\u003e\n\u003ctd\u003e230.7\u003c/td\u003e\n\u003ctd\u003e31.8\u003c/td\u003e\n\u003ctd\u003e0.0291\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eTests/day: mean=4,163, min=4, max=23,699\u003c/li\u003e\n\u003cli\u003eIPs/day: mean=513\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/daily_performance.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/daily_server_split.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/dow_ndt_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/dow_ndt_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/dow_ndt_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/temporal/hourly_performance.html"], "title": "Temporal Patterns"}, {"analysis": "path_quality", "blurb": "Route stability and health over the period.", "narrative_html": "\u003cp\u003ePath quality encompasses several complementary metrics. \u003cstrong\u003eReachability\u003c/strong\u003e measures whether traceroutes successfully reach the destination AS; gaps indicate routing black-holes or firewall drops. The \u003cstrong\u003egeographic detour ratio\u003c/strong\u003e $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ compares the total geolocated hop distance $d_{\\text{path}}$ to the straight-line great-circle distance $d_{\\text{gc}}$ between the school and server; $\\rho = 1.0$ is a perfectly direct route, and larger values indicate circuitous routing (tromboning). \u003cstrong\u003ePath stability\u003c/strong\u003e captures how often the same school-to-server pair uses different AS-level routes across repeated tests.\u003c/p\u003e\n\u003cp\u003eReachability is low at 18.1%. More than a quarter of traceroutes fail to reach the destination AS. This is a significant signal that warrants investigation of routing or firewall policies on affected server paths.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReachability:\u003c/strong\u003e 18.1% of traceroutes reach the destination ASN\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eReachability\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003edel02 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e0.7%\u003c/td\u003e\n\u003ctd\u003e450\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel04 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e0.8%\u003c/td\u003e\n\u003ctd\u003e602\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel05 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e40\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003elhe152605 (Lahore)\u003c/td\u003e\n\u003ctd\u003e18.3%\u003c/td\u003e\n\u003ctd\u003e157,089\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThe mean detour ratio $\\rho = 5.85$ is substantially above 1.0, indicating that school traffic travels roughly 5.9$\\times$ the great-circle distance. This level of circuitousness commonly arises when traffic exits and re-enters the country through distant peering points.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeographic Detour Ratio\u003c/strong\u003e (path distance / great-circle distance):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOverall: mean=5.85, median=6.80\u003c/li\u003e\n\u003cli\u003eA ratio of 1.0 = perfectly direct; higher = more circuitous routing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eMean Detour\u003c/th\u003e\n\u003cth\u003eMedian Detour\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003edel02 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e8.36\u003c/td\u003e\n\u003ctd\u003e8.35\u003c/td\u003e\n\u003ctd\u003e450\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel04 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e9.03\u003c/td\u003e\n\u003ctd\u003e9.15\u003c/td\u003e\n\u003ctd\u003e602\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003edel05 (New Delhi)\u003c/td\u003e\n\u003ctd\u003e13.82\u003c/td\u003e\n\u003ctd\u003e14.51\u003c/td\u003e\n\u003ctd\u003e40\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003elhe152605 (Lahore)\u003c/td\u003e\n\u003ctd\u003e5.83\u003c/td\u003e\n\u003ctd\u003e6.80\u003c/td\u003e\n\u003ctd\u003e157,089\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003ePath stability is moderate: 71.3% of flows use a single AS path, with an average of 1.39 distinct paths per flow. Some churn in routing paths may reflect load balancing or peering changes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePath Stability\u003c/strong\u003e (school\u2192server flows with $\\geq 3$ tests):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlows analyzed: 4,616\u003c/li\u003e\n\u003cli\u003eMean distinct AS paths per flow: 1.39\u003c/li\u003e\n\u003cli\u003eFlows with a single stable path: 71.3%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eReverse Path:\u003c/strong\u003e 0 / 158,181 measurements have reverse traceroute (0.0%)\u003c/p\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_quality/cdf_detour_ratio.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_quality/cdf_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/uz/june_2026/path_quality/path_stability.html"], "title": "Path Quality"}, {"analysis": "rtt_decomposition", "blurb": "Where latency accumulates: domestic access versus international transit.", "narrative_html": "\u003cp\u003eRTT decomposition attributes total round-trip latency to individual transit autonomous systems and countries by computing the incremental delay added at each hop. This pinpoints which network operators or geographic segments contribute the most to observed latency. The detour ratio $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ (path distance over great-circle distance) contextualises whether latency stems from physical distance or routing inefficiency.\u003c/p\u003e\n\u003cp\u003eThe single largest RTT contributor is \u003cstrong\u003eAS28910\u003c/strong\u003e, adding a mean of \u003cstrong\u003e40.8 ms\u003c/strong\u003e per traceroute (17.3% of total observed RTT). Identifying the operator and location of this AS can guide peering negotiations or routing policy changes to reduce latency for schools.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Transit ASN (top 10):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003eMean % of Total\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/28910\" rel=\"noopener noreferrer\"\u003eAS28910\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e40.8\u003c/td\u003e\n\u003ctd\u003e13.7\u003c/td\u003e\n\u003ctd\u003e17.3%\u003c/td\u003e\n\u003ctd\u003e157,894\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/38193\" rel=\"noopener noreferrer\"\u003eAS38193\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e1.6\u003c/td\u003e\n\u003ctd\u003e0.8\u003c/td\u003e\n\u003ctd\u003e0.7%\u003c/td\u003e\n\u003ctd\u003e157,061\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/3216\" rel=\"noopener noreferrer\"\u003eAS3216\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e71.6\u003c/td\u003e\n\u003ctd\u003e76.7\u003c/td\u003e\n\u003ctd\u003e33.2%\u003c/td\u003e\n\u003ctd\u003e154,695\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/21299\" rel=\"noopener noreferrer\"\u003eAS21299\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e8.8\u003c/td\u003e\n\u003ctd\u003e6.5\u003c/td\u003e\n\u003ctd\u003e3.9%\u003c/td\u003e\n\u003ctd\u003e63,943\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/8193\" rel=\"noopener noreferrer\"\u003eAS8193\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e3.8\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e1.8%\u003c/td\u003e\n\u003ctd\u003e28,692\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/60299\" rel=\"noopener noreferrer\"\u003eAS60299\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e24.7\u003c/td\u003e\n\u003ctd\u003e25.3\u003c/td\u003e\n\u003ctd\u003e15.0%\u003c/td\u003e\n\u003ctd\u003e1,238\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/50509\" rel=\"noopener noreferrer\"\u003eAS50509\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e23.1\u003c/td\u003e\n\u003ctd\u003e22.7\u003c/td\u003e\n\u003ctd\u003e14.1%\u003c/td\u003e\n\u003ctd\u003e1,236\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/55836\" rel=\"noopener noreferrer\"\u003eAS55836\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e31.4\u003c/td\u003e\n\u003ctd\u003e27.0\u003c/td\u003e\n\u003ctd\u003e12.9%\u003c/td\u003e\n\u003ctd\u003e602\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e124.5\u003c/td\u003e\n\u003ctd\u003e114.2\u003c/td\u003e\n\u003ctd\u003e51.3%\u003c/td\u003e\n\u003ctd\u003e602\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/9498\" rel=\"noopener noreferrer\"\u003eAS9498\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e180.8\u003c/td\u003e\n\u003ctd\u003e180.6\u003c/td\u003e\n\u003ctd\u003e70.3%\u003c/td\u003e\n\u003ctd\u003e450\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eBy country, \u003cstrong\u003ePK\u003c/strong\u003e contributes the most to RTT with a mean of 27.1 ms per traceroute, reflecting the latency added by hops within or through that country\u0027s network infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Country (top hops):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eCountry\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003en hops\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ePK\u003c/td\u003e\n\u003ctd\u003e27.1\u003c/td\u003e\n\u003ctd\u003e15.5\u003c/td\u003e\n\u003ctd\u003e783,271\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eUZ\u003c/td\u003e\n\u003ctd\u003e13.4\u003c/td\u00
