"\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003e#\u003c/th\u003e\u003cth\u003eIP\u003c/th\u003e\u003cth\u003eASN\u003c/th\u003e\u003cth\u003eOrg\u003c/th\u003e\u003cth\u003eCountry\u003c/th\u003e\u003cth\u003eCity\u003c/th\u003e\u003cth\u003eRTT\u003c/th\u003e\u003cth\u003e\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e1\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e190.98.179.216\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eCO\u003c/td\u003e\u003ctd\u003eBogota\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e0.0\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e2\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e190.98.179.193\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eCO\u003c/td\u003e\u003ctd\u003eBogota\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e54.0\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e3\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e84.16.15.31\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eCO\u003c/td\u003e\u003ctd\u003eBogota\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e53.9\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e4\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e94.142.97.39\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eUS\u003c/td\u003e\u003ctd\u003eMiami\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e53.4\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003cspan class=\"ip-flag ip-flag-country\"\u003ecountry change\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e5\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e213.140.43.206\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eUS\u003c/td\u003e\u003ctd\u003eMiami\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e74.8\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #4285F4\"\u003e6\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e94.142.107.179\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#4285F4\"\u003eAS12956\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eTelxius Cable\u003c/td\u003e\u003ctd\u003eUS\u003c/td\u003e\u003ctd\u003eMiami\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e55.7\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\u003c/details\u003e\u003c/div\u003e", "plots": [], "title": "Interesting Example Paths"}, {"analysis": "topology_graphs", "blurb": "The autonomous-system graph school traffic crosses to leave the country. Nodes are networks; edges are observed links.", "narrative_html": "\u003cp\u003eThe AS-level graph for this period contains 9 autonomous systems connected by 13 observed edges, built from 1,512 valid traceroute measurements. Each node is a network operator; each edge is a peering or transit link observed at least once in school traffic. \nNo IXP nodes were detected in the AS-city graph for this period, which may indicate that school traffic does not pass through recognisable exchange points or that geolocation data is limited.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eGraph\u003c/th\u003e\n\u003cth\u003eNodes\u003c/th\u003e\n\u003cth\u003eEdges\u003c/th\u003e\n\u003cth\u003eValid measurements\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-level\u003c/td\u003e\n\u003ctd\u003e9\u003c/td\u003e\n\u003ctd\u003e13\u003c/td\u003e\n\u003ctd\u003e1,512\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-city\u003c/td\u003e\n\u003ctd\u003e28\u003c/td\u003e\n\u003ctd\u003e51\u003c/td\u003e\n\u003ctd\u003e1,921\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- IXP nodes in AS-city graph: \u003cstrong\u003e0\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/topology_graphs/as_city_force_directed.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/topology_graphs/as_city_hierarchical.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/topology_graphs/as_city_layered_sankey.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/topology_graphs/as_graph.html"], "title": "Network Topology Graphs"}, {"analysis": "path_length", "blurb": "Hop counts from schools to domestic versus foreign servers. Fewer hops mean more direct routes.", "narrative_html": "\u003cp\u003ePath length counts the intermediate hops, at both the IP and autonomous-system level, that school traffic traverses before reaching its destination. Longer paths generally correlate with higher latency and more opportunities for packet loss. The table below shows mean / median across local (domestic M-Lab server) and international destinations.\u003c/p\u003e\n\u003cp\u003eAcross all destinations this period, traceroutes traverse a mean of \u003cstrong\u003e7.6 IP hops\u003c/strong\u003e and cross \u003cstrong\u003e2.1 autonomous systems\u003c/strong\u003e on average. The mean geographic path distance is 5,784 km (median 5,219 km), which reflects the physical routing footprint of school traffic.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eInternational\u003c/th\u003e\n\u003cth\u003eOverall\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIP Hops\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e7.6 / 8.0\u003c/td\u003e\n\u003ctd\u003e7.6 / 8.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAS Path Length\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e2.1 / 2.0\u003c/td\u003e\n\u003ctd\u003e2.1 / 2.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eGeographic Distance (km)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e5783.9 / 5218.7\u003c/td\u003e\n\u003ctd\u003e5783.9 / 5218.7\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCountries Traversed\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e2.8 / 3.0\u003c/td\u003e\n\u003ctd\u003e2.8 / 3.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cem\u003e(mean / median)\u003c/em\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_geo_distance_km_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_geo_distance_km_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_n_as_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_n_as_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_n_hops_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_n_hops_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_rtt_ms_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_length/cdf_rtt_ms_by_server.html"], "title": "Average Path Length: Local vs International"}, {"analysis": "ixp_crossing", "blurb": "How often traffic crosses an Internet Exchange Point, where networks peer locally instead of routing abroad.", "narrative_html": "\u003cp\u003eInternet Exchange Points (IXPs) are physical locations where networks interconnect and exchange traffic directly, often reducing latency and transit costs. A traceroute is counted as crossing an IXP when at least one hop falls within a known IXP prefix. The crossing fraction $f_{\\text{IXP}}$ is defined as the ratio of tests with at least one IXP hop to the total number of tests. Higher values indicate that school traffic benefits from local peering infrastructure.\u003c/p\u003e\n\u003cp\u003eThe low crossing rate ($f_{\\text{IXP}} = 0 / 1,921 = 0.0\\%$) indicates that most school traffic does not pass through a recognised IXP, which may reflect limited local peering or gaps in IXP prefix coverage in the dataset.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOverall:\u003c/strong\u003e 0.0% of tests cross at least one IXP (0 / 1,921)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003eAvg IXPs\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e489\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog05\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e1,274\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebvb1916\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e158\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eIXPs Crossed (% of tests)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/46408\" rel=\"noopener noreferrer\"\u003eAS46408\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eColumbus Communication St. Vincent.\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e383\u003c/td\u003e\n\u003ctd\u003e--\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/398901\" rel=\"noopener noreferrer\"\u003eAS398901\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eUnknown\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e1,538\u003c/td\u003e\n\u003ctd\u003e--\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": [], "title": "IXP Crossing Analysis"}, {"analysis": "transit_countries", "blurb": "The foreign countries school traffic transits before reaching its destination. More countries mean more external dependence.", "narrative_html": "\u003cp\u003eWhen a traceroute hop is geolocated or registered to a country other than the origin or destination, that country is a transit country: its infrastructure carries the traffic. Heavy dependence on a single transit country creates geopolitical and reliability risk. Policy changes or outages there can affect all international school connectivity. Two methods are used: IP geolocation of hop addresses, and the registration country of each hop\u0027s autonomous system.\u003c/p\u003e\n\u003cp\u003eBy IP geolocation, \u003cstrong\u003eUS\u003c/strong\u003e is the dominant transit country, appearing in 100.0% of international tests. A single dominant transit country means that a large share of the country\u0027s outbound school traffic is physically routed through foreign infrastructure before reaching its destination.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBy IP Geolocation:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e100.0% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1,921\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCW\u003c/td\u003e\n\u003ctd\u003e66.6% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1,279\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKN\u003c/td\u003e\n\u003ctd\u003e5.2%\u003c/td\u003e\n\u003ctd\u003e100\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePR\u003c/td\u003e\n\u003ctd\u003e1.2%\u003c/td\u003e\n\u003ctd\u003e23\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eBy AS Registration Country:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e78.7% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1,512\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIT\u003c/td\u003e\n\u003ctd\u003e72.0% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1,384\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eES\u003c/td\u003e\n\u003ctd\u003e28.9%\u003c/td\u003e\n\u003ctd\u003e555\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eJM\u003c/td\u003e\n\u003ctd\u003e2.8%\u003c/td\u003e\n\u003ctd\u003e54\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/transit_countries/transit_country_sankey_June 2026.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/transit_countries/transit_dependency_June 2026.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/transit_countries/transit_dependency_as_registration_June 2026.html"], "title": "Transit Country Dependency"}, {"analysis": "transit_concentration", "blurb": "How concentrated international routes are across transit providers. High concentration is a resilience risk.", "narrative_html": "\u003cp\u003eThis measures how centralized a country\u0027s international routing is. Chokepoint coverage is the share of international tests whose path includes the single most-traversed transit AS. The egress Herfindahl-Hirschman Index partitions tests by one representative egress operator each and is defined as\u003c/p\u003e\n\u003cp\u003e$$\\mathrm{HHI} = \\sum_{i} s_i^2$$\u003c/p\u003e\n\u003cp\u003ewhere $s_i$ is operator $i$\u0027s share of tests. $\\mathrm{HHI}$ near $1$ means a single operator carries essentially all traffic. We report three egress views: the first observed transit AS, the first AS located outside the country (physical border), and the first foreign-registered AS (ownership). Domestic hops are often unresolved, so the first observed transit can already be a foreign operator.\u003c/p\u003e\n\u003cp\u003eChokepoint coverage: \u003cstrong\u003e71.8%\u003c/strong\u003e of international tests traverse the single most-used transit AS (AS23520), indicating notable dependence.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEgress, first observed transit: $\\mathrm{HHI}=0.509$, top operator AS23520 carries 69.2% of tests (409 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first out-of-country: $\\mathrm{HHI}=0.509$, top operator AS23520 carries 69.2% of tests (409 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first foreign-registered: $\\mathrm{HHI}=0.509$, top operator AS23520 carries 69.2% of tests (409 tests without one)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRank\u003c/th\u003e\n\u003cth\u003eTransit ASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eReg.\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eCoverage\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23520\" rel=\"noopener noreferrer\"\u003eAS23520\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eLIBERTY-NETWORKS\u003c/td\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e1,379\u003c/td\u003e\n\u003ctd\u003e71.8%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/174\" rel=\"noopener noreferrer\"\u003eAS174\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eCogent Communications\u003c/td\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e223\u003c/td\u003e\n\u003ctd\u003e11.6%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/3257\" rel=\"noopener noreferrer\"\u003eAS3257\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eGTT Communications\u003c/td\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e133\u003c/td\u003e\n\u003ctd\u003e6.9%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/6762\" rel=\"noopener noreferrer\"\u003eAS6762\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eTelecom Italia Sparkle\u003c/td\u003e\n\u003ctd\u003eIT\u003c/td\u003e\n\u003ctd\u003e110\u003c/td\u003e\n\u003ctd\u003e5.7%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/12956\" rel=\"noopener noreferrer\"\u003eAS12956\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eTelxius Cable\u003c/td\u003e\n\u003ctd\u003eES\u003c/td\u003e\n\u003ctd\u003e66\u003c/td\u003e\n\u003ctd\u003e3.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/46408\" rel=\"noopener noreferrer\"\u003eAS46408\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eColumbus Communication St. Vi.\u003c/td\u003e\n\u003ctd\u003eVC\u003c/td\u003e\n\u003ctd\u003e59\u003c/td\u003e\n\u003ctd\u003e3.1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33576\" rel=\"noopener noreferrer\"\u003eAS33576\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eDigicel Group\u003c/td\u003e\n\u003ctd\u003eJM\u003c/td\u003e\n\u003ctd\u003e54\u003c/td\u003e\n\u003ctd\u003e2.8%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eEgress concentration by source ASN (first-transit HHI):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eSource ASN\u003c/th\u003e\n\u003cth\u003eIntl n\u003c/th\u003e\n\u003cth\u003eEgress HHI\u003c/th\u003e\n\u003cth\u003eTop egress\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/46408\" rel=\"noopener noreferrer\"\u003eAS46408\u003c/a\u003e (Columbus Communication S.)\u003c/td\u003e\n\u003ctd\u003e383\u003c/td\u003e\n\u003ctd\u003e0.52\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23520\" rel=\"noopener noreferrer\"\u003eAS23520\u003c/a\u003e (51%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/398901\" rel=\"noopener noreferrer\"\u003eAS398901\u003c/a\u003e (?)\u003c/td\u003e\n\u003ctd\u003e1,538\u003c/td\u003e\n\u003ctd\u003e0.53\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23520\" rel=\"noopener noreferrer\"\u003eAS23520\u003c/a\u003e (55%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": [], "title": "International Transit Concentration"}, {"analysis": "loss_analysis", "blurb": "Packet loss along measured paths, and how it tracks with path length and distance.", "narrative_html": "\u003cp\u003ePacket loss is measured at each traceroute hop as the fraction of probes that receive no response. This section examines how loss rates vary with path length (number of AS hops) and geographic distance. Longer, more geographically dispersed paths typically experience higher cumulative loss, but loss concentrated at short paths may indicate access-layer or last-mile issues rather than backbone congestion.\u003c/p\u003e\n\u003cp\u003eLoss rates are highest for paths traversing \u003cstrong\u003e4 AS hops\u003c/strong\u003e (mean loss 0.0928), and lowest for \u003cstrong\u003e4 AS hops\u003c/strong\u003e (mean loss 0.0928). A clear monotonic increase with path length would implicate backbone transit; a spike at short paths suggests last-mile or access network issues.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by AS Path Length:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAS Count\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003cth\u003eIQR\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e45\u003c/td\u003e\n\u003ctd\u003e0.0338\u003c/td\u003e\n\u003ctd\u003e0.0928\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.1350]\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGeographically, loss is highest in the \u003cstrong\u003e1,000\u20135,000 km\u003c/strong\u003e distance bucket (mean loss 0.1856), pointing to where in the routing chain congestion or quality degradation is most pronounced.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by Geographic Distance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDistance\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Dist (km)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1,000\u20135,000 km\u003c/td\u003e\n\u003ctd\u003e555\u003c/td\u003e\n\u003ctd\u003e4,882\u003c/td\u003e\n\u003ctd\u003e0.1980\u003c/td\u003e\n\u003ctd\u003e0.1856\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e$\u0026gt;5{,}000$ km\u003c/td\u003e\n\u003ctd\u003e1,366\u003c/td\u003e\n\u003ctd\u003e5,219\u003c/td\u003e\n\u003ctd\u003e0.1852\u003c/td\u003e\n\u003ctd\u003e0.1755\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/cdf_geographic_distance.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/cdf_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/loss_by_as_count_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/loss_by_as_count_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/loss_by_distance_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/loss_by_distance_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/loss_analysis/loss_vs_distance_scatter.html"], "title": "Loss Rate Analysis"}, {"analysis": "school_performance", "blurb": "Round-trip time, throughput, and loss per school. Flags the underserved.", "narrative_html": "\u003cp\u003eThis section profiles connectivity quality at the level of individual schools, aggregating RTT, throughput, and loss metrics per school IP. Schools in the top quartile of both RTT and loss are flagged as underserved, a heuristic that surfaces schools with poor path quality on multiple dimensions simultaneously. These schools may benefit most from targeted infrastructure investment or routing improvements.\u003c/p\u003e\n\u003cp\u003eOnly 0.0% of schools (0 of 10) are underserved (RTT $\\geq 115.8$ ms and loss $\\geq 0.2054$), suggesting generally adequate path quality across the school population.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSchools with $\\geq 5$ tests: \u003cstrong\u003e10\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUnderserved (top quartile RTT + loss): \u003cstrong\u003e0\u003c/strong\u003e (0.0%)\u003c/li\u003e\n\u003cli\u003eThresholds: RTT $\\geq 115.8$ ms, loss $\\geq 0.2054$\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePer-ASN School Stats (median of school medians):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eSchools\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eUnderserved\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/398901\" rel=\"noopener noreferrer\"\u003eAS398901\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e6\u003c/td\u003e\n\u003ctd\u003e113.0\u003c/td\u003e\n\u003ctd\u003e8.0\u003c/td\u003e\n\u003ctd\u003e0.1944\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/46408\" rel=\"noopener noreferrer\"\u003eAS46408\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e113.7\u003c/td\u003e\n\u003ctd\u003e18.8\u003c/td\u003e\n\u003ctd\u003e0.1938\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/school_performance/school_rtt_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/school_performance/school_rtt_vs_loss.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/school_performance/school_rtt_vs_throughput.html"], "title": "Per-School Performance"}, {"analysis": "temporal", "blurb": "How performance shifts by hour and day of week, in local time.", "narrative_html": "\u003cp\u003eNetwork performance for schools often varies systematically with time of day and day of week, reflecting shared infrastructure contention during school hours or business peaks. This section shows how test volume, RTT, throughput, and loss shift across hours and days. Pronounced diurnal patterns can indicate congestion during peak hours; weekend vs. weekday differences may reflect shared community or campus network usage.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDay-of-week and hour-of-day are in local time (America/St_Vincent).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThere is a pronounced diurnal RTT swing of \u003cstrong\u003e26.9 ms\u003c/strong\u003e between the best hour (22:00, 104.7 ms) and the worst (17:00, 131.6 ms), consistent with shared-infrastructure congestion during peak hours.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHour-of-Day (local time):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePeak usage: \u003cstrong\u003e08:00\u003c/strong\u003e (331 tests); quietest: 22:00 (1)\u003c/li\u003e\n\u003cli\u003eMedian RTT: best at 22:00 (104.7 ms), worst at 17:00 (131.6 ms)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDay-of-Week Performance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDay\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMonday\u003c/td\u003e\n\u003ctd\u003e403\u003c/td\u003e\n\u003ctd\u003e110.1\u003c/td\u003e\n\u003ctd\u003e3.0\u003c/td\u003e\n\u003ctd\u003e0.2202\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTuesday\u003c/td\u003e\n\u003ctd\u003e378\u003c/td\u003e\n\u003ctd\u003e114.4\u003c/td\u003e\n\u003ctd\u003e14.3\u003c/td\u003e\n\u003ctd\u003e0.1973\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eWednesday\u003c/td\u003e\n\u003ctd\u003e330\u003c/td\u003e\n\u003ctd\u003e118.0\u003c/td\u003e\n\u003ctd\u003e16.6\u003c/td\u003e\n\u003ctd\u003e0.1980\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eThursday\u003c/td\u003e\n\u003ctd\u003e312\u003c/td\u003e\n\u003ctd\u003e111.8\u003c/td\u003e\n\u003ctd\u003e7.2\u003c/td\u003e\n\u003ctd\u003e0.1929\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFriday\u003c/td\u003e\n\u003ctd\u003e330\u003c/td\u003e\n\u003ctd\u003e112.8\u003c/td\u003e\n\u003ctd\u003e17.9\u003c/td\u003e\n\u003ctd\u003e0.1685\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaturday\u003c/td\u003e\n\u003ctd\u003e106\u003c/td\u003e\n\u003ctd\u003e124.8\u003c/td\u003e\n\u003ctd\u003e72.7\u003c/td\u003e\n\u003ctd\u003e0.0771\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSunday\u003c/td\u003e\n\u003ctd\u003e62\u003c/td\u003e\n\u003ctd\u003e125.3\u003c/td\u003e\n\u003ctd\u003e78.2\u003c/td\u003e\n\u003ctd\u003e0.0352\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eTests/day: mean=62, min=2, max=150\u003c/li\u003e\n\u003cli\u003eIPs/day: mean=5\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/daily_performance.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/daily_server_split.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/dow_ndt_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/dow_ndt_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/dow_ndt_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/temporal/hourly_performance.html"], "title": "Temporal Patterns"}, {"analysis": "path_quality", "blurb": "Route stability and health over the period.", "narrative_html": "\u003cp\u003ePath quality encompasses several complementary metrics. \u003cstrong\u003eReachability\u003c/strong\u003e measures whether traceroutes successfully reach the destination AS; gaps indicate routing black-holes or firewall drops. The \u003cstrong\u003egeographic detour ratio\u003c/strong\u003e $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ compares the total geolocated hop distance $d_{\\text{path}}$ to the straight-line great-circle distance $d_{\\text{gc}}$ between the school and server; $\\rho = 1.0$ is a perfectly direct route, and larger values indicate circuitous routing (tromboning). \u003cstrong\u003ePath stability\u003c/strong\u003e captures how often the same school-to-server pair uses different AS-level routes across repeated tests.\u003c/p\u003e\n\u003cp\u003eReachability is low at 2.3%. More than a quarter of traceroutes fail to reach the destination AS. This is a significant signal that warrants investigation of routing or firewall policies on affected server paths.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReachability:\u003c/strong\u003e 2.3% of traceroutes reach the destination ASN\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eReachability\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e489\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog05\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e1,274\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebvb1916\u003c/td\u003e\n\u003ctd\u003e28.5%\u003c/td\u003e\n\u003ctd\u003e158\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThe mean detour ratio $\\rho = 3.71$ is substantially above 1.0, indicating that school traffic travels roughly 3.7$\\times$ the great-circle distance. This level of circuitousness commonly arises when traffic exits and re-enters the country through distant peering points.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeographic Detour Ratio\u003c/strong\u003e (path distance / great-circle distance):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOverall: mean=3.71, median=3.07\u003c/li\u003e\n\u003cli\u003eA ratio of 1.0 = perfectly direct; higher = more circuitous routing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eMean Detour\u003c/th\u003e\n\u003cth\u003eMedian Detour\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog02\u003c/td\u003e\n\u003ctd\u003e2.97\u003c/td\u003e\n\u003ctd\u003e2.90\u003c/td\u003e\n\u003ctd\u003e489\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebog05\u003c/td\u003e\n\u003ctd\u003e3.03\u003c/td\u003e\n\u003ctd\u003e3.07\u003c/td\u003e\n\u003ctd\u003e1,274\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ebvb1916\u003c/td\u003e\n\u003ctd\u003e11.45\u003c/td\u003e\n\u003ctd\u003e11.26\u003c/td\u003e\n\u003ctd\u003e158\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003ePath stability is low: only 37.9% of flows consistently use the same AS path, averaging 1.93 distinct paths. High path diversity can complicate performance diagnosis and may indicate unstable routing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePath Stability\u003c/strong\u003e (school\u2192server flows with $\\geq 3$ tests):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlows analyzed: 29\u003c/li\u003e\n\u003cli\u003eMean distinct AS paths per flow: 1.93\u003c/li\u003e\n\u003cli\u003eFlows with a single stable path: 37.9%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eReverse Path:\u003c/strong\u003e 103 / 1,921 measurements have reverse traceroute (5.4%)\n- Forward/reverse AS path match: 0.0%\n- Mean forward AS length: 2.1, reverse: 3.5\u003c/p\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_quality/cdf_detour_ratio.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_quality/cdf_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/path_quality/path_stability.html"], "title": "Path Quality"}, {"analysis": "rtt_decomposition", "blurb": "Where latency accumulates: domestic access versus international transit.", "narrative_html": "\u003cp\u003eRTT decomposition attributes total round-trip latency to individual transit autonomous systems and countries by computing the incremental delay added at each hop. This pinpoints which network operators or geographic segments contribute the most to observed latency. The detour ratio $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ (path distance over great-circle distance) contextualises whether latency stems from physical distance or routing inefficiency.\u003c/p\u003e\n\u003cp\u003eThe single largest RTT contributor is \u003cstrong\u003eAS23520\u003c/strong\u003e, adding a mean of \u003cstrong\u003e46.9 ms\u003c/strong\u003e per traceroute (39.0% of total observed RTT). Identifying the operator and location of this AS can guide peering negotiations or routing policy changes to reduce latency for schools.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Transit ASN (top 10):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003eMean % of Total\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23520\" rel=\"noopener noreferrer\"\u003eAS23520\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e46.9\u003c/td\u003e\n\u003ctd\u003e51.9\u003c/td\u003e\n\u003ctd\u003e39.0%\u003c/td\u003e\n\u003ctd\u003e1,379\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/6762\" rel=\"noopener noreferrer\"\u003eAS6762\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e78.6\u003c/td\u003e\n\u003ctd\u003e71.9\u003c/td\u003e\n\u003ctd\u003e66.1%\u003c/td\u003e\n\u003ctd\u003e1,376\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/12956\" rel=\"noopener noreferrer\"\u003eAS12956\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e68.3\u003c/td\u003e\n\u003ctd\u003e57.1\u003c/td\u003e\n\u003ctd\u003e57.8%\u003c/td\u003e\n\u003ctd\u003e555\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/174\" rel=\"noopener noreferrer\"\u003eAS174\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e30.0\u003c/td\u003e\n\u003ctd\u003e47.2\u003c/td\u003e\n\u003ctd\u003e27.1%\u003c/td\u003e\n\u003ctd\u003e223\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/3257\" rel=\"noopener noreferrer\"\u003eAS3257\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e9.2\u003c/td\u003e\n\u003ctd\u003e4.2\u003c/td\u003e\n\u003ctd\u003e6.9%\u003c/td\u003e\n\u003ctd\u003e133\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/46408\" rel=\"noopener noreferrer\"\u003eAS46408\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e16.6\u003c/td\u003e\n\u003ctd\u003e9.5\u003c/td\u003e\n\u003ctd\u003e8.3%\u003c/td\u003e\n\u003ctd\u003e104\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33576\" rel=\"noopener noreferrer\"\u003eAS33576\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e0.3\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e54\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/1916\" rel=\"noopener noreferrer\"\u003eAS1916\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e23.2\u003c/td\u003e\n\u003ctd\u003e28.4\u003c/td\u003e\n\u003ctd\u003e10.9%\u003c/td\u003e\n\u003ctd\u003e45\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eBy country, \u003cstrong\u003eUS\u003c/strong\u003e contributes the most to RTT with a mean of 15.6 ms per traceroute, reflecting the latency added by hops within or through that country\u0027s network infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Country (top hops):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eCountry\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003en hops\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e15.6\u003c/td\u003e\n\u003ctd\u003e1.0\u003c/td\u003e\n\u003ctd\u003e5,078\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCO\u003c/td\u003e\n\u003ctd\u003e47.4\u003c/td\u003e\n\u003ctd\u003e56.5\u003c/td\u003e\n\u003ctd\u003e2,257\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCW\u003c/td\u003e\n\u003ctd\u003e24.9\u003c/td\u003e\n\u003ctd\u003e18.3\u003c/td\u003e\n\u003ctd\u003e1,279\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eBR\u003c/td\u003e\n\u003ctd\u003e18.8\u003c/td\u003e\n\u003ctd\u003e8.8\u003c/td\u003e\n\u003ctd\u003e975\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eVC\u003c/td\u003e\n\u003ctd\u003e14.4\u003c/td\u003e\n\u003ctd\u003e9.2\u003c/td\u003e\n\u003ctd\u003e120\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eKN\u003c/td\u003e\n\u003ctd\u003e4.8\u003c/td\u003e\n\u003ctd\u003e0.7\u003c/td\u003e\n\u003ctd\u003e100\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePR\u003c/td\u003e\n\u003ctd\u003e12.9\u003c/td\u003e\n\u003ctd\u003e14.4\u003c/td\u003e\n\u003ctd\u003e29\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/rtt_decomposition/rtt_breakdown_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/vc/june_2026/rtt_decomposition/rtt_by_transit_asn.html", "https://storage.googleapis.com/giga_traceroutes/p
