d\u003e\u003cspan class=\"ip-asn\" style=\"background:#9334E6\"\u003eAS33567\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eEconet Telecom Lesotho (PTY) LTD\u003c/td\u003e\u003ctd\u003eLS\u003c/td\u003e\u003ctd\u003eMaseru\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e227.5\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\u003c/details\u003e\u003c/div\u003e", "plots": [], "title": "Interesting Example Paths"}, {"analysis": "topology_graphs", "blurb": "The autonomous-system graph school traffic crosses to leave the country. Nodes are networks; edges are observed links.", "narrative_html": "\u003cp\u003eThe AS-level graph for this period contains 7 autonomous systems connected by 8 observed edges, built from 58 valid traceroute measurements. Each node is a network operator; each edge is a peering or transit link observed at least once in school traffic. \nThe finer-grained AS-city graph resolves routing through 11 location-specific nodes, of which \u003cstrong\u003e1\u003c/strong\u003e are Internet Exchange Points: physical facilities where ISPs and content networks peer directly. A high IXP-node count suggests traffic is exchanged at multiple peering locations rather than being funnelled through a single upstream provider.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eGraph\u003c/th\u003e\n\u003cth\u003eNodes\u003c/th\u003e\n\u003cth\u003eEdges\u003c/th\u003e\n\u003cth\u003eValid measurements\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-level\u003c/td\u003e\n\u003ctd\u003e7\u003c/td\u003e\n\u003ctd\u003e8\u003c/td\u003e\n\u003ctd\u003e58\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-city\u003c/td\u003e\n\u003ctd\u003e11\u003c/td\u003e\n\u003ctd\u003e12\u003c/td\u003e\n\u003ctd\u003e58\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- IXP nodes in AS-city graph: \u003cstrong\u003e1\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/topology_graphs/as_city_force_directed.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/topology_graphs/as_city_hierarchical.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/topology_graphs/as_city_layered_sankey.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/topology_graphs/as_graph.html"], "title": "Network Topology Graphs"}, {"analysis": "path_length", "blurb": "Hop counts from schools to domestic versus foreign servers. Fewer hops mean more direct routes.", "narrative_html": "\u003cp\u003ePath length counts the intermediate hops, at both the IP and autonomous-system level, that school traffic traverses before reaching its destination. Longer paths generally correlate with higher latency and more opportunities for packet loss. The table below shows mean / median across local (domestic M-Lab server) and international destinations.\u003c/p\u003e\n\u003cp\u003eAcross all destinations this period, traceroutes traverse a mean of \u003cstrong\u003e8.2 IP hops\u003c/strong\u003e and cross \u003cstrong\u003e3.7 autonomous systems\u003c/strong\u003e on average. The mean geographic path distance is 370 km (median 372 km), which reflects the physical routing footprint of school traffic.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eInternational\u003c/th\u003e\n\u003cth\u003eOverall\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIP Hops\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e8.2 / 9.0\u003c/td\u003e\n\u003ctd\u003e8.2 / 9.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAS Path Length\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3.7 / 4.0\u003c/td\u003e\n\u003ctd\u003e3.7 / 4.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eGeographic Distance (km)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e370.4 / 372.2\u003c/td\u003e\n\u003ctd\u003e370.4 / 372.2\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCountries Traversed\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1.8 / 2.0\u003c/td\u003e\n\u003ctd\u003e1.8 / 2.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cem\u003e(mean / median)\u003c/em\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_geo_distance_km_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_geo_distance_km_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_n_as_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_n_as_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_n_hops_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_n_hops_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_rtt_ms_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_length/cdf_rtt_ms_by_server.html"], "title": "Average Path Length: Local vs International"}, {"analysis": "ixp_crossing", "blurb": "How often traffic crosses an Internet Exchange Point, where networks peer locally instead of routing abroad.", "narrative_html": "\u003cp\u003eInternet Exchange Points (IXPs) are physical locations where networks interconnect and exchange traffic directly, often reducing latency and transit costs. A traceroute is counted as crossing an IXP when at least one hop falls within a known IXP prefix. The crossing fraction $f_{\\text{IXP}}$ is defined as the ratio of tests with at least one IXP hop to the total number of tests. Higher values indicate that school traffic benefits from local peering infrastructure.\u003c/p\u003e\n\u003cp\u003eA crossing rate this high ($f_{\\text{IXP}} = 53 / 58 = 91.4\\%$) means the vast majority of school traffic passes through at least one Internet Exchange, suggesting well-developed local peering infrastructure that can reduce reliance on expensive international transit.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOverall:\u003c/strong\u003e 91.4% of tests cross at least one IXP (53 / 58)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003eAvg IXPs\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e100.0%\u003c/td\u003e\n\u003ctd\u003e1.00\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eIXPs Crossed (% of tests)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33567\" rel=\"noopener noreferrer\"\u003eAS33567\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eEconet Telecom Lesotho (PTY) LTD\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e91.4%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e58\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e (91.4%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eIXP\u003c/th\u003e\n\u003cth\u003eHops\u003c/th\u003e\n\u003cth\u003eCountries\u003c/th\u003e\n\u003cth\u003eServers\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NAPAfrica%20IX%20Johannesburg\" rel=\"noopener noreferrer\"\u003eNAPAfrica IX Johannesburg\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/ixp_crossing/ixp_crossing_by_server.html"], "title": "IXP Crossing Analysis"}, {"analysis": "transit_countries", "blurb": "The foreign countries school traffic transits before reaching its destination. More countries mean more external dependence.", "narrative_html": "\u003cp\u003eWhen a traceroute hop is geolocated or registered to a country other than the origin or destination, that country is a transit country: its infrastructure carries the traffic. Heavy dependence on a single transit country creates geopolitical and reliability risk. Policy changes or outages there can affect all international school connectivity. Two methods are used: IP geolocation of hop addresses, and the registration country of each hop\u0027s autonomous system.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBy AS Registration Country:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMW\u003c/td\u003e\n\u003ctd\u003e91.4% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMU\u003c/td\u003e\n\u003ctd\u003e65.5% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e38\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e8.6%\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/transit_countries/transit_country_sankey_June 2026.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/transit_countries/transit_dependency_as_registration_June 2026.html"], "title": "Transit Country Dependency"}, {"analysis": "transit_concentration", "blurb": "How concentrated international routes are across transit providers. High concentration is a resilience risk.", "narrative_html": "\u003cp\u003eThis measures how centralized a country\u0027s international routing is. Chokepoint coverage is the share of international tests whose path includes the single most-traversed transit AS. The egress Herfindahl-Hirschman Index partitions tests by one representative egress operator each and is defined as\u003c/p\u003e\n\u003cp\u003e$$\\mathrm{HHI} = \\sum_{i} s_i^2$$\u003c/p\u003e\n\u003cp\u003ewhere $s_i$ is operator $i$\u0027s share of tests. $\\mathrm{HHI}$ near $1$ means a single operator carries essentially all traffic. We report three egress views: the first observed transit AS, the first AS located outside the country (physical border), and the first foreign-registered AS (ownership). Domestic hops are often unresolved, so the first observed transit can already be a foreign operator.\u003c/p\u003e\n\u003cp\u003eChokepoint coverage: \u003cstrong\u003e91.4%\u003c/strong\u003e of international tests traverse the single most-used transit AS (AS37187), indicating severe single-point dependence.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEgress, first observed transit: $\\mathrm{HHI}=0.840$, top operator AS37187 carries 91.4% of tests\u003c/li\u003e\n\u003cli\u003eEgress, first out-of-country: $\\mathrm{HHI}=0.840$, top operator AS37187 carries 91.4% of tests\u003c/li\u003e\n\u003cli\u003eEgress, first foreign-registered: $\\mathrm{HHI}=0.840$, top operator AS37187 carries 91.4% of tests\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRank\u003c/th\u003e\n\u003cth\u003eTransit ASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eReg.\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eCoverage\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eSkyband\u003c/td\u003e\n\u003ctd\u003eMW\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003ctd\u003e91.4%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37662\" rel=\"noopener noreferrer\"\u003eAS37662\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eWIOCC\u003c/td\u003e\n\u003ctd\u003eMU\u003c/td\u003e\n\u003ctd\u003e38\u003c/td\u003e\n\u003ctd\u003e65.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23058\" rel=\"noopener noreferrer\"\u003eAS23058\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eDiscovery Health\u003c/td\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e20\u003c/td\u003e\n\u003ctd\u003e34.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eEgress concentration by source ASN (first-transit HHI):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eSource ASN\u003c/th\u003e\n\u003cth\u003eIntl n\u003c/th\u003e\n\u003cth\u003eEgress HHI\u003c/th\u003e\n\u003cth\u003eTop egress\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33567\" rel=\"noopener noreferrer\"\u003eAS33567\u003c/a\u003e (Econet Telecom Lesotho (.)\u003c/td\u003e\n\u003ctd\u003e58\u003c/td\u003e\n\u003ctd\u003e0.84\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e (91%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": [], "title": "International Transit Concentration"}, {"analysis": "loss_analysis", "blurb": "Packet loss along measured paths, and how it tracks with path length and distance.", "narrative_html": "\u003cp\u003ePacket loss is measured at each traceroute hop as the fraction of probes that receive no response. This section examines how loss rates vary with path length (number of AS hops) and geographic distance. Longer, more geographically dispersed paths typically experience higher cumulative loss, but loss concentrated at short paths may indicate access-layer or last-mile issues rather than backbone congestion.\u003c/p\u003e\n\u003cp\u003eLoss rates are highest for paths traversing \u003cstrong\u003e3 AS hops\u003c/strong\u003e (mean loss 0.1209), and lowest for \u003cstrong\u003e4 AS hops\u003c/strong\u003e (mean loss 0.0959). A clear monotonic increase with path length would implicate backbone transit; a spike at short paths suggests last-mile or access network issues.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by AS Path Length:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAS Count\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003cth\u003eIQR\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e0.1209\u003c/td\u003e\n\u003ctd\u003e0.1209\u003c/td\u003e\n\u003ctd\u003e[0.1209, 0.1209]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e41\u003c/td\u003e\n\u003ctd\u003e0.1042\u003c/td\u003e\n\u003ctd\u003e0.0959\u003c/td\u003e\n\u003ctd\u003e[0.0897, 0.1146]\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGeographically, loss is highest in the \u003cstrong\u003e200\u20131,000 km\u003c/strong\u003e distance bucket (mean loss 0.0761), pointing to where in the routing chain congestion or quality degradation is most pronounced.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by Geographic Distance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDistance\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Dist (km)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e200\u20131,000 km\u003c/td\u003e\n\u003ctd\u003e58\u003c/td\u003e\n\u003ctd\u003e372\u003c/td\u003e\n\u003ctd\u003e0.0939\u003c/td\u003e\n\u003ctd\u003e0.0761\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/cdf_geographic_distance.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/cdf_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/loss_by_as_count_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/loss_by_as_count_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/loss_by_distance_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/loss_by_distance_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/loss_analysis/loss_vs_distance_scatter.html"], "title": "Loss Rate Analysis"}, {"analysis": "school_performance", "blurb": "Round-trip time, throughput, and loss per school. Flags the underserved.", "narrative_html": "\u003cp\u003eThis section profiles connectivity quality at the level of individual schools, aggregating RTT, throughput, and loss metrics per school IP. Schools in the top quartile of both RTT and loss are flagged as underserved, a heuristic that surfaces schools with poor path quality on multiple dimensions simultaneously. These schools may benefit most from targeted infrastructure investment or routing improvements.\u003c/p\u003e\n\u003cp\u003e20.0% of schools (1 of 5) are underserved (RTT $\\geq 24.9$ ms and loss $\\geq 0.1042$), indicating a meaningful minority experiencing poor path quality.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSchools with $\\geq 5$ tests: \u003cstrong\u003e5\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUnderserved (top quartile RTT + loss): \u003cstrong\u003e1\u003c/strong\u003e (20.0%)\u003c/li\u003e\n\u003cli\u003eThresholds: RTT $\\geq 24.9$ ms, loss $\\geq 0.1042$\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePer-ASN School Stats (median of school medians):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eSchools\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eUnderserved\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33567\" rel=\"noopener noreferrer\"\u003eAS33567\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e22.2\u003c/td\u003e\n\u003ctd\u003e59.4\u003c/td\u003e\n\u003ctd\u003e0.0929\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/school_performance/school_rtt_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/school_performance/school_rtt_vs_loss.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/school_performance/school_rtt_vs_throughput.html"], "title": "Per-School Performance"}, {"analysis": "temporal", "blurb": "How performance shifts by hour and day of week, in local time.", "narrative_html": "\u003cp\u003eNetwork performance for schools often varies systematically with time of day and day of week, reflecting shared infrastructure contention during school hours or business peaks. This section shows how test volume, RTT, throughput, and loss shift across hours and days. Pronounced diurnal patterns can indicate congestion during peak hours; weekend vs. weekday differences may reflect shared community or campus network usage.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDay-of-week and hour-of-day are in local time (Africa/Maseru).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThere is a pronounced diurnal RTT swing of \u003cstrong\u003e22.4 ms\u003c/strong\u003e between the best hour (13:00, 10.2 ms) and the worst (11:00, 32.5 ms), consistent with shared-infrastructure congestion during peak hours.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHour-of-Day (local time):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePeak usage: \u003cstrong\u003e18:00\u003c/strong\u003e (12 tests); quietest: 13:00 (2)\u003c/li\u003e\n\u003cli\u003eMedian RTT: best at 13:00 (10.2 ms), worst at 11:00 (32.5 ms)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDay-of-Week Performance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDay\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMonday\u003c/td\u003e\n\u003ctd\u003e12\u003c/td\u003e\n\u003ctd\u003e24.9\u003c/td\u003e\n\u003ctd\u003e59.4\u003c/td\u003e\n\u003ctd\u003e0.1209\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTuesday\u003c/td\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e25.7\u003c/td\u003e\n\u003ctd\u003e10.5\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eThursday\u003c/td\u003e\n\u003ctd\u003e18\u003c/td\u003e\n\u003ctd\u003e21.9\u003c/td\u003e\n\u003ctd\u003e60.9\u003c/td\u003e\n\u003ctd\u003e0.0892\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFriday\u003c/td\u003e\n\u003ctd\u003e24\u003c/td\u003e\n\u003ctd\u003e22.7\u003c/td\u003e\n\u003ctd\u003e47.3\u003c/td\u003e\n\u003ctd\u003e0.0918\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eTests/day: mean=12, min=4, max=24\u003c/li\u003e\n\u003cli\u003eIPs/day: mean=2\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/daily_performance.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/daily_server_split.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/dow_ndt_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/dow_ndt_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/dow_ndt_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/temporal/hourly_performance.html"], "title": "Temporal Patterns"}, {"analysis": "path_quality", "blurb": "Route stability and health over the period.", "narrative_html": "\u003cp\u003ePath quality encompasses several complementary metrics. \u003cstrong\u003eReachability\u003c/strong\u003e measures whether traceroutes successfully reach the destination AS; gaps indicate routing black-holes or firewall drops. The \u003cstrong\u003egeographic detour ratio\u003c/strong\u003e $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ compares the total geolocated hop distance $d_{\\text{path}}$ to the straight-line great-circle distance $d_{\\text{gc}}$ between the school and server; $\\rho = 1.0$ is a perfectly direct route, and larger values indicate circuitous routing (tromboning). \u003cstrong\u003ePath stability\u003c/strong\u003e captures how often the same school-to-server pair uses different AS-level routes across repeated tests.\u003c/p\u003e\n\u003cp\u003eReachability stands at 77.6%. A meaningful fraction of traceroutes do not reach the destination AS, which may reflect ICMP rate-limiting at intermediate hops or routing issues on specific server paths.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReachability:\u003c/strong\u003e 77.6% of traceroutes reach the destination ASN\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eReachability\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e77.4%\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e80.0%\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThe mean detour ratio $\\rho = 1.03$ is close to the theoretical minimum of 1.0, suggesting that school traffic follows geographically efficient routes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeographic Detour Ratio\u003c/strong\u003e (path distance / great-circle distance):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOverall: mean=1.03, median=1.03\u003c/li\u003e\n\u003cli\u003eA ratio of 1.0 = perfectly direct; higher = more circuitous routing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eMean Detour\u003c/th\u003e\n\u003cth\u003eMedian Detour\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb01\u003c/td\u003e\n\u003ctd\u003e1.03\u003c/td\u003e\n\u003ctd\u003e1.03\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ejnb02\u003c/td\u003e\n\u003ctd\u003e1.03\u003c/td\u003e\n\u003ctd\u003e1.03\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003ePath stability is low: only 28.6% of flows consistently use the same AS path, averaging 1.71 distinct paths. High path diversity can complicate performance diagnosis and may indicate unstable routing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePath Stability\u003c/strong\u003e (school\u2192server flows with $\\geq 3$ tests):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlows analyzed: 7\u003c/li\u003e\n\u003cli\u003eMean distinct AS paths per flow: 1.71\u003c/li\u003e\n\u003cli\u003eFlows with a single stable path: 28.6%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eReverse Path:\u003c/strong\u003e 9 / 58 measurements have reverse traceroute (15.5%)\u003c/p\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_quality/cdf_detour_ratio.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_quality/cdf_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/path_quality/path_stability.html"], "title": "Path Quality"}, {"analysis": "rtt_decomposition", "blurb": "Where latency accumulates: domestic access versus international transit.", "narrative_html": "\u003cp\u003eRTT decomposition attributes total round-trip latency to individual transit autonomous systems and countries by computing the incremental delay added at each hop. This pinpoints which network operators or geographic segments contribute the most to observed latency. The detour ratio $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ (path distance over great-circle distance) contextualises whether latency stems from physical distance or routing inefficiency.\u003c/p\u003e\n\u003cp\u003eThe single largest RTT contributor is \u003cstrong\u003eAS2018\u003c/strong\u003e, adding a mean of \u003cstrong\u003e7.9 ms\u003c/strong\u003e per traceroute (42.8% of total observed RTT). Identifying the operator and location of this AS can guide peering negotiations or routing policy changes to reduce latency for schools.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Transit ASN (top 10):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003eMean % of Total\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/2018\" rel=\"noopener noreferrer\"\u003eAS2018\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e7.9\u003c/td\u003e\n\u003ctd\u003e2.9\u003c/td\u003e\n\u003ctd\u003e42.8%\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37187\" rel=\"noopener noreferrer\"\u003eAS37187\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e10.3\u003c/td\u003e\n\u003ctd\u003e9.6\u003c/td\u003e\n\u003ctd\u003e50.5%\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/33567\" rel=\"noopener noreferrer\"\u003eAS33567\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e183.9\u003c/td\u003e\n\u003ctd\u003e210.5\u003c/td\u003e\n\u003ctd\u003e1058.9%\u003c/td\u003e\n\u003ctd\u003e45\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/37662\" rel=\"noopener noreferrer\"\u003eAS37662\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e0.4\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e1.1%\u003c/td\u003e\n\u003ctd\u003e38\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/23058\" rel=\"noopener noreferrer\"\u003eAS23058\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e0.6\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e1.7%\u003c/td\u003e\n\u003ctd\u003e20\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/15169\" rel=\"noopener noreferrer\"\u003eAS15169\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e26.2\u003c/td\u003e\n\u003ctd\u003e22.4\u003c/td\u003e\n\u003ctd\u003e88.5%\u003c/td\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eBy country, \u003cstrong\u003eZA\u003c/strong\u003e contributes the most to RTT with a mean of 4.1 ms per traceroute, reflecting the latency added by hops within or through that country\u0027s network infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Country (top hops):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eCountry\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003en hops\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eZA\u003c/td\u003e\n\u003ctd\u003e4.1\u003c/td\u003e\n\u003ctd\u003e0.2\u003c/td\u003e\n\u003ctd\u003e275\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLS\u003c/td\u003e\n\u003ctd\u003e61.3\u003c/td\u003e\n\u003ctd\u003e6.4\u003c/td\u003e\n\u003ctd\u003e135\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/rtt_decomposition/rtt_breakdown_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/rtt_decomposition/rtt_by_transit_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/ls/june_2026/rtt_decomposition/rtt_per_hop.html"], "title": "RTT Decomposition"}]}</script>
