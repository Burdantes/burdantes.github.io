/td\u003e\u003ctd class=\"ip-rtt\"\u003e77.3\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003cspan class=\"ip-flag ip-flag-as\"\u003eAS change\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd class=\"ip-ttl\" style=\"border-left:3px solid #9334E6\"\u003e10\u003c/td\u003e\u003ctd class=\"ip-ip\"\u003e124.43.241.145\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"ip-asn\" style=\"background:#9334E6\"\u003eAS9329\u003c/span\u003e\u003c/td\u003e\u003ctd\u003eSri Lanka Telecom\u003c/td\u003e\u003ctd\u003eLK\u003c/td\u003e\u003ctd\u003eColombo\u003c/td\u003e\u003ctd class=\"ip-rtt\"\u003e77.3\u003c/td\u003e\u003ctd class=\"ip-note\"\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\u003c/details\u003e\u003c/div\u003e", "plots": [], "title": "Interesting Example Paths"}, {"analysis": "topology_graphs", "blurb": "The autonomous-system graph school traffic crosses to leave the country. Nodes are networks; edges are observed links.", "data_source": {"key": "traceroute", "label": "Traceroute", "tip": "Derived from the measured route only."}, "narrative_html": "\u003cp\u003eThe AS-level graph for this period contains 19 autonomous systems connected by 50 observed edges, built from 81,691 valid traceroute measurements. Each node is a network operator; each edge is a peering or transit link observed at least once in school traffic. \nThe finer-grained AS-city graph resolves routing through 100 location-specific nodes, of which \u003cstrong\u003e5\u003c/strong\u003e are Internet Exchange Points: physical facilities where ISPs and content networks peer directly. A high IXP-node count suggests traffic is exchanged at multiple peering locations rather than being funnelled through a single upstream provider.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eGraph\u003c/th\u003e\n\u003cth\u003eNodes\u003c/th\u003e\n\u003cth\u003eEdges\u003c/th\u003e\n\u003cth\u003eValid measurements\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-level\u003c/td\u003e\n\u003ctd\u003e19\u003c/td\u003e\n\u003ctd\u003e50\u003c/td\u003e\n\u003ctd\u003e81,691\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAS-city\u003c/td\u003e\n\u003ctd\u003e100\u003c/td\u003e\n\u003ctd\u003e304\u003c/td\u003e\n\u003ctd\u003e81,922\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e- IXP nodes in AS-city graph: \u003cstrong\u003e5\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/topology_graphs/as_city_force_directed.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/topology_graphs/as_city_hierarchical.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/topology_graphs/as_city_layered_sankey.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/topology_graphs/as_graph.html"], "title": "Network Topology Graphs"}, {"analysis": "path_length", "blurb": "Hop counts from schools to domestic versus foreign servers. Fewer hops mean more direct routes.", "data_source": {"key": "traceroute", "label": "Traceroute", "tip": "Derived from the measured route only."}, "narrative_html": "\u003cp\u003ePath length counts the intermediate hops, at both the IP and autonomous-system level, that school traffic traverses before reaching its destination. Longer paths generally correlate with higher latency and more opportunities for packet loss. The table below shows mean / median across local (domestic M-Lab server) and international destinations.\u003c/p\u003e\n\u003cp\u003eAcross all destinations this period, traceroutes traverse a mean of \u003cstrong\u003e11.1 IP hops\u003c/strong\u003e and cross \u003cstrong\u003e3.0 autonomous systems\u003c/strong\u003e on average. The mean geographic path distance is 15,062 km (median 17,243 km), which reflects the physical routing footprint of school traffic.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eInternational\u003c/th\u003e\n\u003cth\u003eOverall\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eIP Hops\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e11.1 / 10.0\u003c/td\u003e\n\u003ctd\u003e11.1 / 10.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAS Path Length\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3.0 / 3.0\u003c/td\u003e\n\u003ctd\u003e3.0 / 3.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eGeographic Distance (km)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e15061.8 / 17242.6\u003c/td\u003e\n\u003ctd\u003e15061.8 / 17242.6\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCountries Traversed\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e3.1 / 3.0\u003c/td\u003e\n\u003ctd\u003e3.1 / 3.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cem\u003e(mean / median)\u003c/em\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003ctd\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_geo_distance_km_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_geo_distance_km_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_n_as_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_n_as_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_n_hops_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_n_hops_by_server.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_rtt_ms_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_length/cdf_rtt_ms_by_server.html"], "title": "Average Path Length: Local vs International"}, {"analysis": "ixp_crossing", "blurb": "How often traffic crosses an Internet Exchange Point, where networks peer locally instead of routing abroad.", "data_source": {"key": "traceroute", "label": "Traceroute", "tip": "Derived from the measured route only."}, "narrative_html": "\u003cp\u003eInternet Exchange Points (IXPs) are physical locations where networks interconnect and exchange traffic directly, often reducing latency and transit costs. A traceroute is counted as crossing an IXP when at least one hop falls within a known IXP prefix. The crossing fraction $f_{\\text{IXP}}$ is defined as the ratio of tests with at least one IXP hop to the total number of tests. Higher values indicate that school traffic benefits from local peering infrastructure.\u003c/p\u003e\n\u003cp\u003eWith a crossing rate of $f_{\\text{IXP}} = 28,414 / 81,922 = 34.7\\%$, a substantial share of school traffic touches an IXP, but a significant fraction still bypasses local exchange points entirely.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOverall:\u003c/strong\u003e 34.7% of tests cross at least one IXP (28,414 / 81,922)\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eIXP Rate\u003c/th\u003e\n\u003cth\u003eAvg IXPs\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa01\u003c/td\u003e\n\u003ctd\u003e0.0%\u003c/td\u003e\n\u003ctd\u003e0.00\u003c/td\u003e\n\u003ctd\u003e37,285\u003c/ e21,415\u003c/td\u003e\n\u003ctd\u003eFR\u003c/td\u003e\n\u003ctd\u003emaa02, maa03\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NL-ix\" rel=\"noopener noreferrer\"\u003eNL-ix\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e4,174\u003c/td\u003e\n\u003ctd\u003eNL\u003c/td\u003e\n\u003ctd\u003emaa02\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=Equinix%20Singapore\" rel=\"noopener noreferrer\"\u003eEquinix Singapore\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e2,723\u003c/td\u003e\n\u003ctd\u003eSG\u003c/td\u003e\n\u003ctd\u003emaa02, maa03\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=France-IX%20Marseille\" rel=\"noopener noreferrer\"\u003eFrance-IX Marseille\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e53\u003c/td\u003e\n\u003ctd\u003eFR\u003c/td\u003e\n\u003ctd\u003emaa03\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://www.peeringdb.com/search?q=NetIX\" rel=\"noopener noreferrer\"\u003eNetIX\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e49\u003c/td\u003e\n\u003ctd\u003eBG\u003c/td\u003e\n\u003ctd\u003emaa03\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/ixp_crossing/ixp_crossing_by_server.html"], "title": "IXP Crossing Analysis"}, {"analysis": "transit_countries", "blurb": "The foreign countries school traffic transits before reaching its destination. More countries mean more external dependence.", "data_source": {"key": "traceroute", "label": "Traceroute", "tip": "Derived from the measured route only."}, "narrative_html": "\u003cp\u003eWhen a traceroute hop is geolocated or registered to a country other than the origin or destination, that country is a transit country: its infrastructure carries the traffic. Heavy dependence on a single transit country creates geopolitical and reliability risk. Policy changes or outages there can affect all international school connectivity. Two methods are used: IP geolocation of hop addresses, and the registration country of each hop\u0027s autonomous system.\u003c/p\u003e\n\u003cp\u003eBy IP geolocation, \u003cstrong\u003eFR\u003c/strong\u003e is the dominant transit country, appearing in 67.6% of international tests. A single dominant transit country means that a large share of the country\u0027s outbound school traffic is physically routed through foreign infrastructure before reaching its destination.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBy IP Geolocation:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eFR\u003c/td\u003e\n\u003ctd\u003e67.6% \u003cstrong\u003eDOMINANT\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e55,382\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSG\u003c/td\u003e\n\u003ctd\u003e28.2%\u003c/td\u003e\n\u003ctd\u003e23,129\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e27.6%\u003c/td\u003e\n\u003ctd\u003e22,644\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eNL\u003c/td\u003e\n\u003ctd\u003e5.4%\u003c/td\u003e\n\u003ctd\u003e4,433\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003esg\u003c/td\u003e\n\u003ctd\u003e1.7%\u003c/td\u003e\n\u003ctd\u003e1,383\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAE\u003c/td\u003e\n\u003ctd\u003e0.3%\u003c/td\u003e\n\u003ctd\u003e226\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003euk\u003c/td\u003e\n\u003ctd\u003e0.2%\u003c/td\u003e\n\u003ctd\u003e177\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e0.2%\u003c/td\u003e\n\u003ctd\u003e164\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMY\u003c/td\u003e\n\u003ctd\u003e0.2%\u003c/td\u003e\n\u003ctd\u003e148\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eHK\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e81\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eBy AS Registration Country:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eTransit Country\u003c/th\u003e\n\u003cth\u003e% of Intl Tests\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eSG\u003c/td\u003e\n\u003ctd\u003e48.1%\u003c/td\u003e\n\u003ctd\u003e39,382\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e45.2%\u003c/td\u003e\n\u003ctd\u003e37,003\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSE\u003c/td\u003e\n\u003ctd\u003e20.3%\u003c/td\u003e\n\u003ctd\u003e16,665\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e0.7%\u003c/td\u003e\n\u003ctd\u003e590\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eHK\u003c/td\u003e\n\u003ctd\u003e0.2%\u003c/td\u003e\n\u003ctd\u003e159\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eAE\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e71\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eBG\u003c/td\u003e\n\u003ctd\u003e0.1%\u003c/td\u003e\n\u003ctd\u003e49\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/transit_countries/transit_country_sankey_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/transit_countries/transit_dependency_June%202026.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/transit_countries/transit_dependency_as_registration_June%202026.html"], "title": "Transit Country Dependency"}, {"analysis": "transit_concentration", "blurb": "How concentrated international routes are across transit providers. High concentration is a resilience risk.", "data_source": {"key": "traceroute", "label": "Traceroute", "tip": "Derived from the measured route only."}, "narrative_html": "\u003cp\u003eThis measures how centralized a country\u0027s international routing is. Chokepoint coverage is the share of international tests whose path includes the single most-traversed transit AS. The egress Herfindahl-Hirschman Index partitions tests by one representative egress operator each and is defined as\u003c/p\u003e\n\u003cp\u003e$$\\mathrm{HHI} = \\sum_{i} s_i^2$$\u003c/p\u003e\n\u003cp\u003ewhere $s_i$ is operator $i$\u0027s share of tests. $\\mathrm{HHI}$ near $1$ means a single operator carries essentially all traffic. We report three egress views: the first observed transit AS, the first AS located outside the country (physical border), and the first foreign-registered AS (ownership). Domestic hops are often unresolved, so the first observed transit can already be a foreign operator.\u003c/p\u003e\n\u003cp\u003eChokepoint coverage: \u003cstrong\u003e74.5%\u003c/strong\u003e of international tests traverse the single most-used transit AS (AS45489), indicating notable dependence.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEgress, first observed transit: $\\mathrm{HHI}=0.336$, top operator AS64049 carries 48.4% of tests (515 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first out-of-country: $\\mathrm{HHI}=0.336$, top operator AS64049 carries 48.4% of tests (535 tests without one)\u003c/li\u003e\n\u003cli\u003eEgress, first foreign-registered: $\\mathrm{HHI}=0.376$, top operator AS64049 carries 51.5% of tests (5,439 tests without one)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRank\u003c/th\u003e\n\u003cth\u003eTransit ASN\u003c/th\u003e\n\u003cth\u003eOrganization\u003c/th\u003e\n\u003cth\u003eReg.\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eCoverage\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/45489\" rel=\"noopener noreferrer\"\u003eAS45489\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eSri Lanka Telecom Global\u003c/td\u003e\n\u003ctd\u003eLK\u003c/td\u003e\n\u003ctd\u003e61,069\u003c/td\u003e\n\u003ctd\u003e74.5%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eReliance Jio Infocomm Singapo.\u003c/td\u003e\n\u003ctd\u003eSG\u003c/td\u003e\n\u003ctd\u003e39,382\u003c/td\u003e\n\u003ctd\u003e48.1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/6453\" rel=\"noopener noreferrer\"\u003eAS6453\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eTATA Communications Ltd\u003c/td\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e19,323\u003c/td\u003e\n\u003ctd\u003e23.6%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/174\" rel=\"noopener noreferrer\"\u003eAS174\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eCogent Communications\u003c/td\u003e\n\u003ctd\u003eUS\u003c/td\u003e\n\u003ctd\u003e18,138\u003c/td\u003e\n\u003ctd\u003e22.1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/1299\" rel=\"noopener noreferrer\"\u003eAS1299\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003eAreli t HHI):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eSource ASN\u003c/th\u003e\n\u003cth\u003eIntl n\u003c/th\u003e\n\u003cth\u003eEgress HHI\u003c/th\u003e\n\u003cth\u003eTop egress\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/9329\" rel=\"noopener noreferrer\"\u003eAS9329\u003c/a\u003e (Sri Lanka Telecom Intern.)\u003c/td\u003e\n\u003ctd\u003e73,621\u003c/td\u003e\n\u003ctd\u003e0.33\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e (47%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/17470\" rel=\"noopener noreferrer\"\u003eAS17470\u003c/a\u003e (Etisalat Lanka (Pvt) Ltd.)\u003c/td\u003e\n\u003ctd\u003e1,433\u003c/td\u003e\n\u003ctd\u003e0.47\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e (58%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/18001\" rel=\"noopener noreferrer\"\u003eAS18001\u003c/a\u003e (Dialog Telekom Ltd)\u003c/td\u003e\n\u003ctd\u003e5,272\u003c/td\u003e\n\u003ctd\u003e0.40\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e (54%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/45356\" rel=\"noopener noreferrer\"\u003eAS45356\u003c/a\u003e (IS Group, No:108, W A D .)\u003c/td\u003e\n\u003ctd\u003e1,483\u003c/td\u003e\n\u003ctd\u003e0.53\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e (70%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/132447\" rel=\"noopener noreferrer\"\u003eAS132447\u003c/a\u003e (Hutchison Telecommunicat.)\u003c/td\u003e\n\u003ctd\u003e113\u003c/td\u003e\n\u003ctd\u003e0.62\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/64049\" rel=\"noopener noreferrer\"\u003eAS64049\u003c/a\u003e (53%)\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": [], "title": "International Transit Concentration"}, {"analysis": "loss_analysis", "blurb": "Packet loss along measured paths, and how it tracks with path length and distance.", "data_source": {"key": "traceroute-ndt", "label": "Traceroute + NDT", "tip": "Combines the route with NDT speed-test metrics (RTT, throughput, loss)."}, "narrative_html": "\u003cp\u003ePacket loss is measured at each traceroute hop as the fraction of probes that receive no response. This section examines how loss rates vary with path length (number of AS hops) and geographic distance. Longer, more geographically dispersed paths typically experience higher cumulative loss, but loss concentrated at short paths may indicate access-layer or last-mile issues rather than backbone congestion.\u003c/p\u003e\n\u003cp\u003eLoss rates are highest for paths traversing \u003cstrong\u003e5 AS hops\u003c/strong\u003e (mean loss 0.0936), and lowest for \u003cstrong\u003e2 AS hops\u003c/strong\u003e (mean loss 0.0264). A clear monotonic increase with path length would implicate backbone transit; a spike at short paths suggests last-mile or access network issues.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by AS Path Length:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAS Count\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003cth\u003eIQR\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e284\u003c/td\u003e\n\u003ctd\u003e0.0001\u003c/td\u003e\n\u003ctd\u003e0.0264\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.0061]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e3,745\u003c/td\u003e\n\u003ctd\u003e0.0003\u003c/td\u003e\n\u003ctd\u003e0.0377\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.0230]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e1,247\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e0.0347\u003c/td\u003e\n\u003ctd\u003e[0.0000, 0.0122]\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e5\u003c/td\u003e\n\u003ctd\u003e13\u003c/td\u003e\n\u003ctd\u003e0.0602\u003c/td\u003e\n\u003ctd\u003e0.0936\u003c/td\u003e\n\u003ctd\u003e[0.0472, 0.0832]\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGeographically, loss is highest in the \u003cstrong\u003e200\u20131,000 km\u003c/strong\u003e distance bucket (mean loss 0.0448), pointing to where in the routing chain congestion or quality degradation is most pronounced.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoss Rate by Geographic Distance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDistance\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003cth\u003eMedian Dist (km)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eMean Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e200\u20131,000 km\u003c/td\u003e\n\u003ctd\u003e200\u003c/td\u003e\n\u003ctd\u003e397\u003c/td\u003e\n\u003ctd\u003e0.0001\u003c/td\u003e\n\u003ctd\u003e0.0448\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e1,000\u20135,000 km\u003c/td\u003e\n\u003ctd\u003e8,149\u003c/td\u003e\n\u003ctd\u003e2,585\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e0.0378\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e$\u0026gt;5{,}000$ km\u003c/td\u003e\n\u003ctd\u003e73,410\u003c/td\u003e\n\u003ctd\u003e17,495\u003c/td\u003e\n\u003ctd\u003e0.0007\u003c/td\u003e\n\u003ctd\u003e0.0442\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/cdf_geographic_distance.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/cdf_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/loss_by_as_count_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/loss_by_as_count_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/loss_by_distance_boxplot.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/loss_by_distance_boxplot_local_international.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/loss_analysis/loss_vs_distance_scatter.html"], "title": "Loss Rate Analysis"}, {"analysis": "school_performance", "blurb": "Round-trip time, throughput, and loss per school. Flags the underserved.", "data_source": {"key": "traceroute-ndt", "label": "Traceroute + NDT", "tip": "Combines the route with NDT speed-test metrics (RTT, throughput, loss)."}, "narrative_html": "\u003cp\u003eThis section profiles connectivity quality at the level of individual schools, aggregating RTT, throughput, and loss metrics per school IP. Schools in the top quartile of both RTT and loss are flagged as underserved, a heuristic that surfaces schools with poor path quality on multiple dimensions simultaneously. These schools may benefit most from targeted infrastructure investment or routing improvements.\u003c/p\u003e\n\u003cp\u003eOnly 7.6% of schools (126 of 1,658) are underserved (RTT $\\geq 330.3$ ms and loss $\\geq 0.0253$), suggesting generally adequate path quality across the school population.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSchools with $\\geq 5$ tests: \u003cstrong\u003e1,658\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUnderserved (top quartile RTT + loss): \u003cstrong\u003e126\u003c/strong\u003e (7.6%)\u003c/li\u003e\n\u003cli\u003eThresholds: RTT $\\geq 330.3$ ms, loss $\\geq 0.0253$\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePer-ASN School Stats (median of school medians):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eSchools\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003cth\u003eUnderserved\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/9329\" rel=\"noopener noreferrer\"\u003eAS9329\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e1,202\u003c/td\u003e\n\u003ctd\u003e231.5\u003c/td\u003e\n\u003ctd\u003e20.6\u003c/td\u003e\n\u003ctd\u003e0.0010\u003c/td\u003e\n\u003ctd\u003e114\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/18001\" rel=\"noopener noreferrer\"\u003eAS18001\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e290\u003c/td\u003e\n\u003ctd\u003e101.9\u003c/td\u003e\n\u003ctd\u003e6.3\u003c/td\u003e\n\u003ctd\u003e0.0004\u003c/td\u003e\n\u003ctd\u003e1\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/17470\" rel=\"noopener noreferrer\"\u003eAS17470\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e88\u003c/td\u003e\n\u003ctd\u003e344.1\u003c/td\u003e\n\u003ctd\u003e2.0\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e11\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/45356\" rel=\"noopener noreferrer\"\u003eAS45356\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e75\u003c/td\u003e\n\u003ctd\u003e170.5\u003c/td\u003e\n\u003ctd\u003e7.0\u003c/td\u003e\n\u003ctd\u003e0.0011\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/132447\" rel=\"noopener noreferrer\"\u003eAS132447\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e3\u003c/td\u003e\n\u003ctd\u003e362.0\u003c/td\u003e\n\u003ctd\u003e0.4\u003c/td\u003e\n\u003ctd\u003e0.0000\u003c/td\u003e\n\u003ctd\u003e0\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/school_performance/school_rtt_by_asn.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/school_performance/school_rtt_vs_loss.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/school_performance/school_rtt_vs_throughput.html"], "title": "Per-School Performance"}, {"analysis": "temporal", "blurb": "How performance shifts by hour and day of week, in local time.", "data_source": {"key": "traceroute-ndt", "label": "Traceroute + NDT", "tip": "Combines the route with NDT speed-test metrics (RTT, throughput, loss)."}, "narrative_html": "\u003cp\u003eNetwork performance for schools often varies systematically with time of day and day of week, reflecting shared infrastructure contention during school hours or business peaks. This section shows how test volume, RTT, throughput, and loss shift across hours and days. Pronounced diurnal patterns can indicate congestion during peak hours; weekend vs. weekday differences may reflect shared community or campus network usage.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDay-of-week and hour-of-day are in local time (Asia/Colombo).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThere is a pronounced diurnal RTT swing of \u003cstrong\u003e97.5 ms\u003c/strong\u003e between the best hour (02:00, 108.3 ms) and the worst (12:00, 205.8 ms), consistent with shared-infrastructure congestion during peak hours.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHour-of-Day (local time):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePeak usage: \u003cstrong\u003e08:00\u003c/strong\u003e (16,891 tests); quietest: 02:00 (76)\u003c/li\u003e\n\u003cli\u003eMedian RTT: best at 02:00 (108.3 ms), worst at 12:00 (205.8 ms)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDay-of-Week Performance:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eDay\u003c/th\u003e\n\u003cth\u003eTests\u003c/th\u003e\n\u003cth\u003eMedian RTT (ms)\u003c/th\u003e\n\u003cth\u003eMedian Tput (Mbps)\u003c/th\u003e\n\u003cth\u003eMedian Loss\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eMonday\u003c/td\u003e\n\u003ctd\u003e17,954\u003c/td\u003e\n\u003ctd\u003e200.2\u003c/td\u003e\n\u003ctd\u003e24.4\u003c/td\u003e\n\u003ctd\u003e0.0009\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTuesday\u003c/td\u003e\n\u003ctd\u003e19,170\u003c/td\u003e\n\u003ctd\u003e199.2\u003c/td\u003e\n\u003ctd\u003e24.0\u003c/td\u003e\n\u003ctd\u003e0.0010\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eWednesday\u003c/td\u003e\n\u003ctd\u003e15,771\u003c/td\u003e\n\u003ctd\u003e197.3\u003c/td\u003e\n\u003ctd\u003e27.5\u003c/td\u003e\n\u003ctd\u003e0.0002\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eThursday\u003c/td\u003e\n\u003ctd\u003e14,540\u003c/td\u003e\n\u003ctd\u003e194.4\u003c/td\u003e\n\u003ctd\u003e26.1\u003c/td\u003e\n\u003ctd\u003e0.0003\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFriday\u003c/td\u003e\n\u003ctd\u003e11,474\u003c/td\u003e\n\u003ctd\u003e204.5\u003c/td\u003e\n\u003ctd\u003e25.4\u003c/td\u003e\n\u003ctd\u003e0.0004\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSaturday\u003c/td\u003e\n\u003ctd\u003e1,539\u003c/td\u003e\n\u003ctd\u003e182.5\u003c/td\u003e\n\u003ctd\u003e7.5\u003c/td\u003e\n\u003ctd\u003e0.0001\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSunday\u003c/td\u003e\n\u003ctd\u003e1,474\u003c/td\u003e\n\u003ctd\u003e180.7\u003c/td\u003e\n\u003ctd\u003e4.3\u003c/td\u003e\n\u003ctd\u003e0.0005\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cul\u003e\n\u003cli\u003eTests/day: mean=2,156, min=2, max=8,725\u003c/li\u003e\n\u003cli\u003eIPs/day: mean=265\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/daily_performance.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/daily_server_split.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/dow_ndt_loss_rate.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/dow_ndt_rtt.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/dow_ndt_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/temporal/hourly_performance.html"], "title": "Temporal Patterns"}, {"analysis": "path_quality", "blurb": "Route stability and health over the period.", "data_source": {"key": "traceroute-ndt", "label": "Traceroute + NDT", "tip": "Combines the route with NDT speed-test metrics (RTT, throughput, loss)."}, "narrative_html": "\u003cp\u003ePath quality encompasses several complementary metrics. \u003cstrong\u003eReachability\u003c/strong\u003e measures whether traceroutes successfully reach the destination AS; gaps indicate routing black-holes or firewall drops. The \u003cstrong\u003egeographic detour ratio\u003c/strong\u003e $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ compares the total geolocated hop distance $d_{\\text{path}}$ to the straight-line great-circle distance $d_{\\text{gc}}$ between the school and server; $\\rho = 1.0$ is a perfectly direct route, and larger values indicate circuitous routing (tromboning). \u003cstrong\u003ePath stability\u003c/strong\u003e captures how often the same school-to-server pair uses different AS-level routes across repeated tests.\u003c/p\u003e\n\u003cp\u003eReachability is low at 6.5%. More than a quarter of traceroutes fail to reach the destination AS. This is a significant signal that warrants investigation of routing or firewall policies on affected server paths.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReachability:\u003c/strong\u003e 6.5% of traceroutes reach the destination ASN\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eReachability\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa01\u003c/td\u003e\n\u003ctd\u003e5.8%\u003c/td\u003e\n\u003ctd\u003e37,285\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa02\u003c/td\u003e\n\u003ctd\u003e5.2%\u003c/td\u003e\n\u003ctd\u003e5,248\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa03\u003c/td\u003e\n\u003ctd\u003e7.3%\u003c/td\u003e\n\u003ctd\u003e39,389\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThe mean detour ratio $\\rho = 37.83$ is substantially above 1.0, indicating that school traffic travels roughly 37.8$\\times$ the great-circle distance. This level of circuitousness commonly arises when traffic exits and re-enters the country through distant peering points.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeographic Detour Ratio\u003c/strong\u003e (path distance / great-circle distance):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOverall: mean=37.83, median=46.66\u003c/li\u003e\n\u003cli\u003eA ratio of 1.0 = perfectly direct; higher = more circuitous routing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eServer\u003c/th\u003e\n\u003cth\u003eMean Detour\u003c/th\u003e\n\u003cth\u003eMedian Detour\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa01\u003c/td\u003e\n\u003ctd\u003e41.68\u003c/td\u003e\n\u003ctd\u003e48.06\u003c/td\u003e\n\u003ctd\u003e37,285\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa02\u003c/td\u003e\n\u003ctd\u003e41.70\u003c/td\u003e\n\u003ctd\u003e44.89\u003c/td\u003e\n\u003ctd\u003e5,248\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003emaa03\u003c/td\u003e\n\u003ctd\u003e33.67\u003c/td\u003e\n\u003ctd\u003e35.25\u003c/td\u003e\n\u003ctd\u003e39,389\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003ePath stability is moderate: 66.8% of flows use a single AS path, with an average of 1.36 distinct paths per flow. Some churn in routing paths may reflect load balancing or peering changes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePath Stability\u003c/strong\u003e (school\u2192server flows with $\\geq 3$ tests):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlows analyzed: 3,948\u003c/li\u003e\n\u003cli\u003eMean distinct AS paths per flow: 1.36\u003c/li\u003e\n\u003cli\u003eFlows with a single stable path: 66.8%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eReverse Path:\u003c/strong\u003e 7,268 / 81,922 measurements have reverse traceroute (8.9%)\n- Forward/reverse AS path match: 0.0%\n- Mean forward AS length: 3.4, reverse: 4.2\u003c/p\u003e\n\u003chr\u003e", "plots": ["https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_quality/cdf_detour_ratio.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_quality/cdf_throughput.html", "https://storage.googleapis.com/giga_traceroutes/plot/lk/june_2026/path_quality/path_stability.html"], "title": "Path Quality"}, {"analysis": "rtt_decomposition", "blurb": "Where latency accumulates: domestic access versus international transit.", "data_source": {"key": "traceroute-ndt", "label": "Traceroute + NDT", "tip": "Combines the route with NDT speed-test metrics (RTT, throughput, loss)."}, "narrative_html": "\u003cp\u003eRTT decomposition attributes total round-trip latency to individual transit autonomous systems and countries by computing the incremental delay added at each hop. This pinpoints which network operators or geographic segments contribute the most to observed latency. The detour ratio $\\rho = d_{\\text{path}} / d_{\\text{gc}}$ (path distance over great-circle distance) contextualises whether latency stems from physical distance or routing inefficiency.\u003c/p\u003e\n\u003cp\u003eThe single largest RTT contributor is \u003cstrong\u003eAS45489\u003c/strong\u003e, adding a mean of \u003cstrong\u003e97.3 ms\u003c/strong\u003e per traceroute (34.7% of total observed RTT). Identifying the operator and location of this AS can guide peering negotiations or routing policy changes to reduce latency for schools.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Transit ASN (top 10):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eASN\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003eMean % of Total\u003c/th\u003e\n\u003cth\u003en\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/45489\" rel=\"noopener noreferrer\"\u003eAS45489\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e97.3\u003c/td\u003e\n\u003ctd\u003e52.6\u003c/td\u003e\n\u003ctd\u003e34.7%\u003c/td\u003e\n\u003ctd\u003e59,941\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/55836\" rel=\"noopener noreferrer\"\u003eAS55836\u003c/a\u003e\u003c/td\u003e 8\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/18001\" rel=\"noopener noreferrer\"\u003eAS18001\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e12.3\u003c/td\u003e\n\u003ctd\u003e2.7\u003c/td\u003e\n\u003ctd\u003e11.2%\u003c/td\u003e\n\u003ctd\u003e5,122\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ca href=\"https://asrank.caida.org/asns/2914\" rel=\"noopener noreferrer\"\u003eAS2914\u003c/a\u003e\u003c/td\u003e\n\u003ctd\u003e161.4\u003c/td\u003e\n\u003ctd\u003e73.1\u003c/td\u003e\n\u003ctd\u003e136.4%\u003c/td\u003e\n\u003ctd\u003e1,545\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eBy country, \u003cstrong\u003eIN\u003c/strong\u003e contributes the most to RTT with a mean of 51.3 ms per traceroute, reflecting the latency added by hops within or through that country\u0027s network infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRTT Contribution by Country (top hops):\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eCountry\u003c/th\u003e\n\u003cth\u003eMean (ms)\u003c/th\u003e\n\u003cth\u003eMedian (ms)\u003c/th\u003e\n\u003cth\u003en hops\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eIN\u003c/td\u003e\n\u003ctd\u003e51.3\u003c/td\u003e\n\u003ctd\u003e23.0\u003c/td\u003e\n\u003ctd\u003e217,898\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLK\u003c/td\u003e\n\u003ctd\u003e4.6\u003c/td\u003e\n\u003ctd\u003e0.0\u003c/td\u003e\n\u003ctd\u003e184,813\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFR\u003c/td\u003e\n\u003ctd\u003e31.4\u003c/td\u003e\n\u003ctd\u003e5.0\u003c/td\u003e\n\u003ctd\u003e180,405\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGB\u003c/td\u003e\n\u003ctd\u003e4.0\u003c/td\u003e\n\u003ctd\u003e1.8\u003c/td\u003e\n\u003ctd\u003e38,953\u003c/td\u003e\n\u003c/tr
